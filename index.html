<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ラジオ体操 スタンプ</title>
  <style>
    :root{
      --bg:#f5fbff;
      --blue:#8fdcff;
      --blue-strong:#63ccff;
      --blue-soft:#dff5ff;
      --text:#55839a;
      --text-deep:#4d7790;
      --white:#ffffff;
      --line:rgba(143,220,255,.34);
      --glass:rgba(255,255,255,.58);
      --glass-strong:rgba(255,255,255,.74);
      --shadow:0 18px 42px rgba(111,205,255,.18);
      --shadow-soft:0 10px 24px rgba(111,205,255,.12);
      --radius:24px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:"Hiragino Sans","Yu Gothic UI","Yu Gothic","Noto Sans JP",system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 14% 16%, rgba(143,220,255,.22), transparent 24%),
        radial-gradient(circle at 86% 14%, rgba(143,220,255,.18), transparent 22%),
        radial-gradient(circle at 78% 80%, rgba(143,220,255,.18), transparent 24%),
        linear-gradient(180deg,#fcfeff 0%,#f1fbff 100%);
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(135deg, rgba(255,255,255,.34), rgba(255,255,255,.05)),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0) 0px,
          rgba(255,255,255,0) 54px,
          rgba(143,220,255,.03) 55px,
          rgba(143,220,255,.03) 56px
        );
      opacity:.85;
    }

    button,input,select{
      font:inherit;
    }

    #app{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    .glass{
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      background:var(--glass);
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
    }

    .hidden{
      display:none !important;
    }

    /* ===== 最初の選択画面 ===== */
    #selectScreen{
      position:absolute;
      inset:0;
      z-index:30;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px;
    }

    #selectWrap{
      width:min(1100px, 100%);
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:28px;
      align-items:stretch;
    }

    .modeCard{
      position:relative;
      min-height:460px;
      border-radius:30px;
      overflow:hidden;
      cursor:pointer;
      background:rgba(255,255,255,.42);
      border:1px solid rgba(143,220,255,.28);
      box-shadow:0 26px 60px rgba(111,205,255,.15);
      transition:transform .28s ease, box-shadow .28s ease, border-color .28s ease;
    }

    .modeCard:hover{
      transform:translateY(-3px);
      box-shadow:0 30px 70px rgba(111,205,255,.20);
      border-color:rgba(143,220,255,.42);
    }

    .modePreview{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
      opacity:.18;
      transition:opacity .28s ease, transform .28s ease;
      pointer-events:none;
    }

    .modePreview img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      border-radius:20px;
      box-shadow:0 22px 46px rgba(111,205,255,.12);
    }

    .modeCard:hover .modePreview{
      opacity:.9;
      transform:scale(1.02);
    }

    .modeLabel{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      z-index:2;
      padding:16px 30px;
      border-radius:999px;
      color:var(--text-deep);
      letter-spacing:.12em;
      font-size:28px;
      font-weight:700;
      background:rgba(255,255,255,.52);
      border:1px solid rgba(143,220,255,.26);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      box-shadow:0 14px 34px rgba(111,205,255,.12);
      transition:transform .25s ease, background .25s ease;
    }

    .modeCard:hover .modeLabel{
      transform:translate(-50%,-50%) scale(1.03);
      background:rgba(255,255,255,.66);
    }

    .modeSmall{
      position:absolute;
      left:24px;
      bottom:20px;
      font-size:13px;
      letter-spacing:.08em;
      color:#7da6ba;
      opacity:.9;
      z-index:2;
    }

    @media (hover:none), (pointer:coarse){
      .modePreview{
        opacity:.42;
      }
    }

    @media (max-width: 900px){
      #selectWrap{
        grid-template-columns:1fr;
        max-width:580px;
      }
      .modeCard{
        min-height:240px;
      }
      .modeLabel{
        font-size:24px;
      }
    }

    /* ===== 上タブ ===== */
    #timeGate{
      position:absolute;
      top:14px;
      left:50%;
      transform:translateX(-50%);
      width:min(760px, calc(100vw - 54px));
      min-height:84px;
      z-index:40;
      border-radius:28px;
      padding:12px 16px;
      background:rgba(255,255,255,.74);
      border:1px solid rgba(143,220,255,.30);
      box-shadow:0 18px 42px rgba(111,205,255,.15);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      display:none;
      align-items:center;
      gap:14px;
    }

    #timeGate.visible{
      display:flex;
    }

    #gateCardThumb{
      width:58px;
      height:58px;
      border-radius:14px;
      background:rgba(143,220,255,.10);
      border:1px solid rgba(143,220,255,.18);
      overflow:hidden;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #gateCardThumb img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    #gateInfo{
      min-width:0;
      flex:1;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    #gateTopLine{
      display:flex;
      align-items:baseline;
      gap:12px;
      flex-wrap:wrap;
    }

    #gateTitle{
      font-size:16px;
      letter-spacing:.1em;
      color:#5f91a8;
      font-weight:700;
      white-space:nowrap;
    }

    #gateHours{
      font-size:14px;
      color:#79a7bc;
      white-space:nowrap;
    }

    #gateRemain{
      font-size:13px;
      color:#86aabc;
      white-space:nowrap;
    }

    #progressWrap{
      width:100%;
      height:12px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(143,220,255,.14);
      position:relative;
    }

    #progressBar{
      position:absolute;
      inset:0 auto 0 0;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg, rgba(143,220,255,.55), rgba(99,204,255,.96));
      box-shadow:0 0 16px rgba(99,204,255,.28);
      transition:width .5s ease;
    }

    /* ===== 通常画面 ===== */
    #mainScreen{
      position:absolute;
      inset:0;
      z-index:10;
    }

    #getCardBtn{
      position:absolute;
      left:20px;
      top:18px;
      z-index:14;
      padding:13px 18px;
      border:none;
      outline:none;
      cursor:pointer;
      color:#5f94ad;
      font-size:15px;
      letter-spacing:.08em;
      border-radius:999px;
      transition:transform .2s ease, box-shadow .2s ease, opacity .2s ease;
    }

    #getCardBtn:hover{
      transform:translateY(-1px);
      box-shadow:0 14px 36px rgba(111,205,255,.18);
    }

    #uploadArea{
      position:absolute;
      right:20px;
      top:18px;
      z-index:14;
      width:210px;
      min-height:68px;
      padding:14px 16px;
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      line-height:1.45;
      color:#77a8bd;
      cursor:pointer;
      transition:transform .2s ease, box-shadow .2s ease, opacity .2s ease;
      overflow:hidden;
    }

    #uploadArea:hover{
      transform:translateY(-1px);
      box-shadow:0 14px 34px rgba(111,205,255,.18);
    }

    #uploadArea input{
      display:none;
    }

    #stageWrap{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:92px 32px 48px;
      transition:filter .3s ease, opacity .3s ease;
    }

    #stageWrap.closed{
      filter:blur(8px) saturate(.92);
      opacity:.82;
    }

    #stage{
      position:relative;
      width:min(82vw, 1120px);
      height:min(78vh, 780px);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #emptyHint{
      position:absolute;
      z-index:1;
      font-size:20px;
      letter-spacing:.10em;
      color:#87adc2;
      opacity:.62;
      pointer-events:none;
    }

    #imageFrame{
      position:relative;
      max-width:100%;
      max-height:100%;
      border-radius:18px;
      overflow:visible;
      touch-action:none;
    }

    #cardImage{
      display:none;
      width:auto;
      height:auto;
      max-width:min(82vw,1120px);
      max-height:min(78vh,780px);
      object-fit:contain;
      border-radius:18px;
      box-shadow:0 28px 60px rgba(111,205,255,.15);
      pointer-events:none;
      -webkit-user-drag:none;
      user-drag:none;
    }

    #stampLayer{
      position:absolute;
      inset:0;
      overflow:hidden;
      border-radius:18px;
      pointer-events:none;
    }

    .stamp{
      position:absolute;
      transform:translate(-50%, -50%) rotate(var(--rot, 0deg));
      transform-origin:center center;
      opacity:.98;
      pointer-events:none;
      filter:drop-shadow(0 6px 12px rgba(111,205,255,.12));
    }

    .stamp img{
      display:block;
      width:100%;
      height:100%;
      object-fit:contain;
      pointer-events:none;
      -webkit-user-drag:none;
    }

    #ghostStamp{
      position:absolute;
      transform:translate(-50%,-50%);
      pointer-events:none;
      opacity:.22;
      display:none;
      z-index:4;
      filter:drop-shadow(0 6px 12px rgba(111,205,255,.08));
    }

    #ghostStamp img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    #pressTarget{
      position:absolute;
      inset:0;
      border-radius:18px;
      background:transparent;
      z-index:5;
      cursor:crosshair;
      touch-action:none;
    }

    /* 画像内ボタン */
    #cardControls{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:8;
    }

    #historyControls{
      position:absolute;
      top:12px;
      right:12px;
      display:flex;
      gap:8px;
      pointer-events:auto;
    }

    .historyBtn{
      width:34px;
      height:34px;
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.36);
      border:1px solid rgba(143,220,255,.18);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      color:rgba(88,133,156,.88);
      font-size:18px;
      cursor:pointer;
      transition:.2s ease;
    }

    .historyBtn:hover{
      background:rgba(255,255,255,.56);
    }

    .historyBtn:disabled{
      opacity:.35;
      cursor:default;
    }

    #saveBtn{
      position:absolute;
      right:12px;
      bottom:12px;
      padding:10px 16px;
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.42);
      border:1px solid rgba(143,220,255,.18);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      color:#5e93ad;
      cursor:pointer;
      pointer-events:auto;
      transition:.2s ease;
    }

    #saveBtn:hover{
      background:rgba(255,255,255,.60);
    }

    /* カーソルゲージ */
    #pressRing{
      position:absolute;
      width:112px;
      height:112px;
      transform:translate(-50%,-50%);
      display:none;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      z-index:9;
    }

    #pressRing svg{
      width:112px;
      height:112px;
      overflow:visible;
      filter:drop-shadow(0 10px 18px rgba(111,205,255,.14));
    }

    .ring-bg{
      stroke:rgba(255,255,255,.75);
      stroke-width:8;
      fill:rgba(255,255,255,.10);
    }

    .ring-progress{
      stroke:var(--blue-strong);
      stroke-width:8;
      fill:none;
      stroke-linecap:round;
      transform:rotate(-90deg);
      transform-origin:50% 50%;
      stroke-dasharray:251.2;
      stroke-dashoffset:251.2;
    }

    .ring-center{
      fill:rgba(255,255,255,.50);
      stroke:rgba(143,220,255,.24);
      stroke-width:1.5;
    }

    /* パスワード */
    #secretTapZone{
      position:absolute;
      left:0;
      bottom:0;
      width:110px;
      height:110px;
      z-index:50;
      background:transparent;
    }

    #passwordPopup{
      position:absolute;
      left:20px;
      bottom:74px;
      z-index:60;
      width:120px;
      padding:10px;
      border-radius:16px;
      display:none;
      background:rgba(255,255,255,.76);
      border:1px solid rgba(143,220,255,.24);
      box-shadow:0 14px 36px rgba(111,205,255,.14);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    #passwordInput{
      width:100%;
      border:none;
      outline:none;
      border-radius:12px;
      padding:10px 12px;
      text-align:center;
      background:rgba(255,255,255,.56);
      color:#5c90a8;
      font-size:18px;
      letter-spacing:.20em;
    }

    #passwordInput::placeholder{
      color:transparent;
    }

    /* アート情報 */
    #artInfo{
      position:absolute;
      left:20px;
      bottom:18px;
      z-index:12;
      padding:12px 16px;
      border-radius:18px;
      color:#6f9cb2;
      font-size:13px;
      letter-spacing:.04em;
      display:none;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    #artLoginBtn{
      border:none;
      border-radius:999px;
      padding:8px 14px;
      color:#5f93ad;
      background:rgba(255,255,255,.52);
      border:1px solid rgba(143,220,255,.22);
      cursor:pointer;
    }

    #backToSelect{
      position:absolute;
      left:20px;
      top:18px;
      z-index:13;
      padding:10px 14px;
      border:none;
      border-radius:999px;
      color:#6e9db4;
      cursor:pointer;
      display:none;
    }

    @media (max-width: 780px){
      #uploadArea{
        width:158px;
        min-height:60px;
        font-size:12px;
      }
      #getCardBtn{
        font-size:13px;
        padding:11px 14px;
      }
      #backToSelect{
        top:auto;
        left:16px;
        bottom:16px;
      }
      #stageWrap{
        padding:90px 14px 24px;
      }
      #timeGate{
        width:calc(100vw - 28px);
      }
      #gateCardThumb{
        width:48px;
        height:48px;
      }
      #gateTitle{
        font-size:14px;
      }
      #gateHours,#gateRemain{
        font-size:12px;
      }
      #secretTapZone{
        width:96px;
        height:96px;
      }
      #passwordPopup{
        left:16px;
        bottom:68px;
      }
      #artInfo{
        left:14px;
        bottom:14px;
        right:14px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 最初の選択画面 -->
    <div id="selectScreen">
      <div id="selectWrap">
        <button class="modeCard" id="artModeBtn" type="button">
          <div class="modePreview"><img src="art.png" alt="art preview"></div>
          <div class="modeLabel">アート型</div>
          <div class="modeSmall">Googleログイン</div>
        </button>

        <button class="modeCard" id="randomModeBtn" type="button">
          <div class="modePreview"><img src="randm.png" alt="random preview"></div>
          <div class="modeLabel">ランダム型</div>
          <div class="modeSmall">ログイン不要</div>
        </button>
      </div>
    </div>

    <!-- 時間外タブ -->
    <div id="timeGate">
      <div id="gateCardThumb"></div>
      <div id="gateInfo">
        <div id="gateTopLine">
          <div id="gateTitle">時間外です</div>
          <div id="gateHours">6:00~6:30</div>
          <div id="gateRemain">残り --時間 --分</div>
        </div>
        <div id="progressWrap">
          <div id="progressBar"></div>
        </div>
      </div>
    </div>

    <!-- メイン -->
    <div id="mainScreen">
      <button id="backToSelect" class="glass" type="button">もどる</button>
      <button id="getCardBtn" class="glass hidden" type="button">カード入手</button>

      <label id="uploadArea" class="glass hidden" for="imageInput">
        <span id="uploadText">カード入れてね</span>
        <input id="imageInput" type="file" accept="image/*" />
      </label>

      <div id="stageWrap">
        <div id="stage">
          <div id="emptyHint">CARD</div>

          <div id="imageFrame">
            <img id="cardImage" alt="card" />

            <div id="stampLayer"></div>

            <div id="ghostStamp"><img id="ghostStampImg" alt="ghost stamp"></div>

            <div id="cardControls">
              <div id="historyControls">
                <button id="undoBtn" class="historyBtn" type="button">↶</button>
                <button id="redoBtn" class="historyBtn" type="button">↷</button>
              </div>
              <button id="saveBtn" type="button">保存</button>
            </div>

            <div id="pressTarget"></div>
          </div>

          <div id="pressRing" aria-hidden="true">
            <svg viewBox="0 0 100 100">
              <circle class="ring-bg" cx="50" cy="50" r="40"></circle>
              <circle class="ring-progress" cx="50" cy="50" r="40"></circle>
              <circle class="ring-center" cx="50" cy="50" r="25"></circle>
            </svg>
          </div>
        </div>
      </div>

      <div id="artInfo" class="glass">
        <span id="artUserText">未ログイン</span>
        <span id="artDayText">今日で0日目</span>
        <button id="artLoginBtn" type="button">Googleログイン</button>
      </div>
    </div>

    <!-- 隠し解除 -->
    <div id="secretTapZone"></div>
    <div id="passwordPopup">
      <input id="passwordInput" type="password" inputmode="numeric" autocomplete="off" maxlength="4" placeholder="">
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

      getDatabase,
      ref,
      get,
      set,
      update
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    // =========================
    // Firebase
    // =========================
    const firebaseConfig = {
      apiKey: "AIzaSyCC7KAv7V4j1Z6-o1Y8ikmb3r5htN9O_aA",
      authDomain: "zzgohan-280.firebaseapp.com",
      databaseURL: "https://zzgohan-280-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "zzgohan-280",
      storageBucket: "zzgohan-280.firebasestorage.app",
      messagingSenderId: "459336048542",
      appId: "1:459336048542:web:ff6c825dec81cc7df8008f",

    const app = initializeApp(firebaseConfig);
    getAnalytics(app);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // =========================
    // 設定
    // =========================
    const JST_OPEN_HOUR = 6;
    const JST_OPEN_MINUTE = 0;
    const JST_CLOSE_HOUR = 6;
    const JST_CLOSE_MINUTE = 30;

    const LONG_PRESS_MS = 4000;
    const OVERRIDE_PASSWORD = "1111";
    const STORAGE_KEY_OVERRIDE = "radio_stamp_time_override";

    const RANDOM_CARD_PATH = "card.png";
    const RANDOM_STAMP_POOL = [
      "stamp100.png",
      "stamp101.png",
      "stamp102.png",
      "stamp103.png"
    ];

    // アート型のカード定義
    // 好きなだけ増やせます
    const ART_CARD_CONFIG = {
      "card1": {
        card: "card1.png",
        stamps: [
          "stamp001.png",
          "stamp002.png",
          "stamp003.png",
          "stamp004.png",
          "stamp005.png"
        ],
        positions: [
          { x:0.22, y:0.28, rotation:-8, size:0.18 },
          { x:0.44, y:0.26, rotation:6,  size:0.18 },
          { x:0.66, y:0.32, rotation:-3, size:0.18 },
          { x:0.36, y:0.57, rotation:8,  size:0.18 },
          { x:0.60, y:0.60, rotation:-6, size:0.18 }
        ]
      },
      "card2": {
        card: "card2.png",
        stamps: [
          "stamp011.png",
          "stamp012.png",
          "stamp013.png",
          "stamp014.png"
        ],
        positions: [
          { x:0.25, y:0.32, rotation:0, size:0.19 },
          { x:0.53, y:0.29, rotation:-10, size:0.19 },
          { x:0.36, y:0.60, rotation:9, size:0.19 },
          { x:0.64, y:0.58, rotation:-7, size:0.19 }
        ]
      }
    };

    const DEFAULT_ART_CARD_ID = "card1";

    // =========================
    // 要素
    // =========================

    // =========================
    // 基本 util
    // =========================
    function clamp(v, min, max){
      return Math.max(min, Math.min(max, v));
    }

    function isTouchDevice(){
      return window.matchMedia("(hover:none), (pointer:coarse)").matches;
    }

    function getJSTNowParts(){
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).formatToParts(now);

      const map = {};
      for(const p of parts){
        if(p.type !== "literal") map[p.type] = p.value;
      }

      return {
        year: Number(map.year),
        month: Number(map.month),
        day: Number(map.day),
        hour: Number(map.hour),
        minute: Number(map.minute),
        second: Number(map.second)
      };
    }

    function getJSTDateKey(){
      const p = getJSTNowParts();
      return `${p.year}-${String(p.month).padStart(2,"0")}-${String(p.day).padStart(2,"0")}`;
    }

    function getMinutesOfDay(h, m){
      return h * 60 + m;
    }

    function getJSTStatus(){
      const p = getJSTNowParts();
      const nowMin = getMinutesOfDay(p.hour, p.minute);
      const openMin = getMinutesOfDay(JST_OPEN_HOUR, JST_OPEN_MINUTE);
      const closeMin = getMinutesOfDay(JST_CLOSE_HOUR, JST_CLOSE_MINUTE);

      const isOpenByTime = nowMin >= openMin && nowMin < closeMin;
      const isOpen = isOpenByTime || overrideOpen;

      let remainingMs = 0;
      let progress = 0;

      if(isOpenByTime){
        const elapsedInOpen = (nowMin - openMin) * 60 + p.second;
        const totalOpenSeconds = (closeMin - openMin) * 60;
        remainingMs = Math.max(0, (totalOpenSeconds - elapsedInOpen) * 1000);
        progress = 100;
      }else{
        let minutesUntilNextOpen;
        if(nowMin < openMin){
          minutesUntilNextOpen = openMin - nowMin;
        }else{
          minutesUntilNextOpen = (24 * 60 - nowMin) + openMin;
        }
        remainingMs = Math.max(0, (minutesUntilNextOpen * 60 - p.second) * 1000);
        const cycleTotal = 24 * 60 * 60 * 1000;
        progress = ((cycleTotal - remainingMs) / cycleTotal) * 100;
      }

      return { isOpen, isOpenByTime, remainingMs, progress };
    }

    function formatRemaining(ms){
      const totalMinutes = Math.ceil(ms / 60000);
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      return `残り ${h}時間 ${m}分`;
    }

    function getCardRect(){
      const r = cardImage.getBoundingClientRect();
      return { left:r.left, top:r.top, width:r.width, height:r.height };
    }

    function pointInsideImage(clientX, clientY){
      const r = getCardRect();
      return (
        clientX >= r.left &&
        clientX <= r.left + r.width &&
        clientY >= r.top &&
        clientY <= r.top + r.height
      );
    }

    function clientToImageRatio(clientX, clientY){
      const r = getCardRect();
      return {
        x: clamp((clientX - r.left) / r.width, 0, 1),
        y: clamp((clientY - r.top) / r.height, 0, 1)
      };
    }

    function imageRatioToClient(x, y){
      const r = getCardRect();
      return {
        x: r.left + r.width * x,
        y: r.top + r.height * y
      };
    }

    function todaySeed(){
      const key = getJSTDateKey().replaceAll("-", "");
      return Number(key);
    }

    function seededIndex(seed, length){
      const x = Math.sin(seed * 9999) * 10000;
      return Math.floor((x - Math.floor(x)) * length) % length;
    }

    function loadImage(src){
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    async function loadArtUserProgress(uid){
      const todayKey = getJSTDateKey();
      const userRef = ref(db, `radioArtUsers/${uid}`);
      const snap = await get(userRef);

      let data = snap.exists() ? snap.val() : null;

      if(!data){
        data = {
          totalDays: 0,
          lastStampedDate: "",
          selectedCardId: DEFAULT_ART_CARD_ID,
          progressByCard: {
            [DEFAULT_ART_CARD_ID]: 0
          }
        };
        await set(userRef, data);
      }

      if(!data.progressByCard) data.progressByCard = {};
      if(typeof data.progressByCard[data.selectedCardId] !== "number"){
        data.progressByCard[data.selectedCardId] = 0;
      }

      currentArtProgress = data;
      currentArtCardId = data.selectedCardId || DEFAULT_ART_CARD_ID;

      const cfg = getArtConfig(currentArtCardId);
      setCardImage(cfg.card);

      artUserText.textContent = currentUser?.displayName || "ログイン中";
      artDayText.textContent = `今日で${data.totalDays || 0}日目`;

      renderArtStampsFromProgress();
      updateTopVisibility();
    }

    function renderArtStampsFromProgress(){
      clearStamps();
      if(!currentArtProgress) return;

      const cfg = getArtConfig(currentArtCardId);
      const progress = currentArtProgress.progressByCard?.[currentArtCardId] || 0;
      const count = Math.min(progress, cfg.stamps.length);

      for(let i=0; i<count; i++){
        const pos = cfg.positions[i];
        displayedStamps.push({
          type:"art",
          x: pos.x,
          y: pos.y,
          rotation: pos.rotation || 0,
          size: pos.size || 0.18,
          src: cfg.stamps[i]
        });
      }
      renderStamps();
      updateHistoryButtons();
    }

    async function stampArtOnce(){
      if(!currentUser || !currentArtProgress) return;
      const todayKey = getJSTDateKey();
      const cfg = getArtConfig(currentArtCardId);

      const currentProgress = currentArtProgress.progressByCard?.[currentArtCardId] || 0;
      if(currentProgress >= cfg.stamps.length) return;

      const nextProgress = currentProgress + 1;
      const updatePayload = {
        [`radioArtUsers/${currentUser.uid}/progressByCard/${currentArtCardId}`]: nextProgress
      };

      if(currentArtProgress.lastStampedDate !== todayKey){
        updatePayload[`radioArtUsers/${currentUser.uid}/totalDays`] = (currentArtProgress.totalDays || 0) + 1;
        updatePayload[`radioArtUsers/${currentUser.uid}/lastStampedDate`] = todayKey;
        currentArtProgress.totalDays = (currentArtProgress.totalDays || 0) + 1;
        currentArtProgress.lastStampedDate = todayKey;
      }

      await update(ref(db), updatePayload);

      currentArtProgress.progressByCard[currentArtCardId] = nextProgress;
      artDayText.textContent = `今日で${currentArtProgress.totalDays || 0}日目`;
      renderArtStampsFromProgress();
    }

    // =========================
    // スタンプ描画
    // =========================
    function renderStamps(){
      stampLayer.innerHTML = "";

      const rect = getCardRect();
      if(!rect.width || !rect.height) return;

      for(const s of displayedStamps){
        const el = document.createElement("div");
        el.className = "stamp";
        el.style.left = `${s.x * 100}%`;
        el.style.top = `${s.y * 100}%`;
        el.style.width = `${Math.max(38, rect.width * (s.size || 0.17))}px`;
        el.style.height = `${Math.max(38, rect.width * (s.size || 0.17))}px`;
        el.style.setProperty("--rot", `${s.rotation || 0}deg`);

        const img = document.createElement("img");
        img.src = s.src;
        img.alt = "stamp";
        el.appendChild(img);

        stampLayer.appendChild(el);
      }
    }

    function updateGhostSizeOnly(){
      const rect = getCardRect();
      if(!rect.width) return;

      if(currentMode === "random"){
        const size = Math.max(38, rect.width * 0.17);
        ghostStamp.style.width = `${size}px`;
        ghostStamp.style.height = `${size}px`;
      }else if(currentMode === "art"){
        const cfg = getArtConfig(currentArtCardId);
        const progress = currentArtProgress?.progressByCard?.[currentArtCardId] || 0;
        const pos = cfg.positions[progress];
        if(pos){
          const size = Math.max(38, rect.width * (pos.size || 0.18));
          ghostStamp.style.width = `${size}px`;
          ghostStamp.style.height = `${size}px`;
        }
      }
    }

    function showGhostStamp(clientX, clientY){
      const rect = getCardRect();
      if(!rect.width) return;

      if(currentMode === "random"){
        ghostStampImg.src = currentRandomStampPath;
        const size = Math.max(38, rect.width * 0.17);
        ghostStamp.style.width = `${size}px`;
        ghostStamp.style.height = `${size}px`;
        moveGhostStamp(clientX, clientY);
        ghostStamp.style.display = "block";
      }else if(currentMode === "art"){
        const cfg = getArtConfig(currentArtCardId);
        const progress = currentArtProgress?.progressByCard?.[currentArtCardId] || 0;
        if(progress >= cfg.stamps.length){
          ghostStamp.style.display = "none";
          return;
        }

        const pos = cfg.positions[progress];
        const p = imageRatioToClient(pos.x, pos.y);
        ghostStampImg.src = cfg.stamps[progress];
        const size = Math.max(38, rect.width * (pos.size || 0.18));
        ghostStamp.style.width = `${size}px`;
        ghostStamp.style.height = `${size}px`;
        ghostStamp.style.left = `${p.x - rect.left}px`;
        ghostStamp.style.top = `${p.y - rect.top}px`;
        ghostStamp.style.transform = `translate(-50%,-50%) rotate(${pos.rotation || 0}deg)`;
        ghostStamp.style.display = "block";
      }
    }

    function moveGhostStamp(clientX, clientY){
      if(currentMode !== "random") return;
      const rect = getCardRect();
      ghostStamp.style.left = `${clientX - rect.left}px`;
      ghostStamp.style.top = `${clientY - rect.top}px`;
      ghostStamp.style.transform = `translate(-50%,-50%) rotate(0deg)`;
    }

    function hideGhostStamp(){
      ghostStamp.style.display = "none";
    }

    // =========================
    // undo / redo
    // =========================
    function pushRandomStamp(xRatio, yRatio){
      displayedStamps.push({
        type:"random",
        x: clamp(xRatio,0,1),
        y: clamp(yRatio,0,1),
        rotation: (-10 + Math.random() * 20).toFixed(2),
        size:0.17,
        src: currentRandomStampPath
      });
      redoStack = [];
      renderStamps();
      updateHistoryButtons();
    }

    function undoStamp(){
      if(currentMode === "art") return;
      if(displayedStamps.length === 0) return;
      redoStack.push(displayedStamps.pop());
      renderStamps();
      updateHistoryButtons();
    }

    function redoStamp(){
      if(currentMode === "art") return;
      if(redoStack.length === 0) return;
      displayedStamps.push(redoStack.pop());
      renderStamps();
      updateHistoryButtons();
    }

    // =========================
    // 長押しゲージ
    // =========================
    function showPressRing(clientX, clientY){
      const stageRect = stage.getBoundingClientRect();
      pressRing.style.left = `${clientX - stageRect.left}px`;
      pressRing.style.top = `${clientY - stageRect.top}px`;
      pressRing.style.display = "flex";
      ringProgress.style.strokeDashoffset = "251.2";
    }

    function movePressRing(clientX, clientY){
      const stageRect = stage.getBoundingClientRect();
      pressRing.style.left = `${clientX - stageRect.left}px`;
      pressRing.style.top = `${clientY - stageRect.top}px`;
    }

    function hidePressRing(){
      pressRing.style.display = "none";
      ringProgress.style.strokeDashoffset = "251.2";
    }

    function animateRing(){
      if(!pressAnimating) return;
      const elapsed = performance.now() - pressStartAt;
      const ratio = clamp(elapsed / LONG_PRESS_MS, 0, 1);
      const total = 251.2;
      ringProgress.style.strokeDashoffset = String(total * (1 - ratio));

      if(ratio >= 1){
        pressAnimating = false;
        hidePressRing();

        if(currentMode === "random" && pressPoint){
          pushRandomStamp(pressPoint.x, pressPoint.y);
        }else if(currentMode === "art"){
          stampArtOnce();
        }

        hideGhostStamp();
        return;
      }
      rafId = requestAnimationFrame(animateRing);
    }

    function cancelPress(){
      pointerDown = false;
      activePointerId = null;
      pressAnimating = false;
      pressPoint = null;

      if(pressTimer){
        clearTimeout(pressTimer);
        pressTimer = null;
      }
      if(rafId){
        cancelAnimationFrame(rafId);
        rafId = null;
      }
      hidePressRing();
      hideGhostStamp();
    }

    function startPress(clientX, clientY){
      if(!activeWindow) return;
      if(!currentCardPath) return;
      if(!pointInsideImage(clientX, clientY)) return;

      if(currentMode === "art" && !currentUser){
        alert("アート型はGoogleログインが必要です。");
        cancelPress();
        return;
      }

      if(currentMode === "random"){
        pressPoint = clientToImageRatio(clientX, clientY);
        showGhostStamp(clientX, clientY);
      }else{
        showGhostStamp(clientX, clientY);
      }

      pressStartAt = performance.now();
      pressAnimating = true;
      showPressRing(clientX, clientY);
      animateRing();

      pressTimer = setTimeout(() => {
        pressTimer = null;
      }, LONG_PRESS_MS);
    }

    function movePress(clientX, clientY){
      if(!pointerDown) return;
      if(!pointInsideImage(clientX, clientY)){
        cancelPress();
        return;
      }

      movePressRing(clientX, clientY);

      if(currentMode === "random"){
        pressPoint = clientToImageRatio(clientX, clientY);
        moveGhostStamp(clientX, clientY);
      }
    }

    // =========================
    // 保存
    // =========================
    async function saveCompositePNG(){
      if(!currentCardPath) return;

      const baseImg = await loadImage(cardImage.src);
      const outCanvas = document.createElement("canvas");
      const ctx = outCanvas.getContext("2d");

      outCanvas.width = baseImg.naturalWidth || baseImg.width;
      outCanvas.height = baseImg.naturalHeight || baseImg.height;

      ctx.clearRect(0, 0, outCanvas.width, outCanvas.height);
      ctx.drawImage(baseImg, 0, 0, outCanvas.width, outCanvas.height);

      for(const s of displayedStamps){
        const img = await loadImage(s.src);
        const size = outCanvas.width * (s.size || 0.17);
        const cx = s.x * outCanvas.width;
        const cy = s.y * outCanvas.height;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate((Number(s.rotation || 0) * Math.PI) / 180);
        ctx.drawImage(img, -size/2, -size/2, size, size);
        ctx.restore();
      }

      const a = document.createElement("a");
      a.href = outCanvas.toDataURL("image/png");
      a.download = currentMode === "art" ? "art-stamp.png" : "random-stamp.png";
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

      a.href = src;
      a.download = filename;

      a.click();
      a.remove();
    }

    pressTarget.addEventListener("contextmenu", (e) => e.preventDefault());

    pressTarget.addEventListener("pointerdown", (e) => {
      if(!activeWindow || !currentCardPath) return;
      pointerDown = true;
      activePointerId = e.pointerId;
      pressTarget.setPointerCapture(e.pointerId);
      startPress(e.clientX, e.clientY);
    });

    pressTarget.addEventListener("pointermove", (e) => {
      if(!pointerDown || e.pointerId !== activePointerId) return;
      movePress(e.clientX, e.clientY);
    });

    pressTarget.addEventListener("pointerup", (e) => {
      if(e.pointerId !== activePointerId) return;
      cancelPress();
    });

    pressTarget.addEventListener("pointercancel", (e) => {
      if(e.pointerId !== activePointerId) return;
      cancelPress();
    });

    pressTarget.addEventListener("pointerleave", () => {
      if(pointerDown) cancelPress();
    });

    imageFrame.addEventListener("pointermove", (e) => {
      if(pointerDown) return;
      if(!activeWindow || !currentCardPath) return;
      if(!pointInsideImage(e.clientX, e.clientY)) {
        hideGhostStamp();
        return;
      }
      showGhostStamp(e.clientX, e.clientY);
    });

    imageFrame.addEventListener("pointerleave", () => {
      if(!pointerDown) hideGhostStamp();
    });

    // 左下ダブルタップ
    secretTapZone.addEventListener("dblclick", (e) => {
      e.preventDefault();
      if(passwordPopup.style.display === "block"){
        hidePasswordPopup();
      }else{
        showPasswordPopup();
      }
    });

    let lastTapTime = 0;
    secretTapZone.addEventListener("touchend", (e) => {
      const now = Date.now();
      if(now - lastTapTime < 350){
        e.preventDefault();
        if(passwordPopup.style.display === "block"){
          hidePasswordPopup();
        }else{
          showPasswordPopup();
        }
      }
      lastTapTime = now;
    }, { passive:false });

    passwordInput.addEventListener("input", () => {
      if(passwordInput.value === OVERRIDE_PASSWORD){
        overrideOpen = true;
        localStorage.setItem(STORAGE_KEY_OVERRIDE, "true");
        hidePasswordPopup();

        if(currentMode === "random"){
          setupRandomMode();
        }else if(currentMode === "art"){
          setupArtMode();
        }else{
          updateTopVisibility();
        }
      }
    });

    document.addEventListener("pointerdown", (e) => {
      if(
        !passwordPopup.contains(e.target) &&
        !secretTapZone.contains(e.target)
      ){
        hidePasswordPopup();
      }
    });

    window.addEventListener("resize", () => {
      renderStamps();
      updateGhostSizeOnly();
    });

    setInterval(() => {
      updateTopVisibility();
    }, 1000);

    // 初期
    showSelectScreen();
    updateTopVisibility();
  </script>
</body>
</html>
