<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ラジオ体操スタンプ</title>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Yomogi&display=swap" rel="stylesheet"/>
<style>
:root{
  --blue:#8fdcff;--blue-s:#63ccff;--text:#55839a;--text-d:#4d7790;
  --glass:rgba(255,255,255,.58);--shadow:0 10px 24px rgba(111,205,255,.12);
  --font:"Kosugi Maru","Yomogi","Hiragino Maru Gothic Pro","Yu Gothic",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:var(--font);color:var(--text);
  background:linear-gradient(rgba(245,251,255,.72),rgba(245,251,255,.72)),url("hk.jpg") center/cover no-repeat;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,.34),rgba(255,255,255,.05)),
    repeating-linear-gradient(90deg,rgba(255,255,255,0) 0,rgba(255,255,255,0) 54px,rgba(143,220,255,.03) 55px,rgba(143,220,255,.03) 56px);
  opacity:.85;}
button,input{font:inherit;}
#app{position:relative;width:100%;height:100%;overflow:hidden;}
.glass{backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);background:rgba(255,255,255,.58);border:1px solid rgba(143,220,255,.34);box-shadow:var(--shadow);}
.hidden{display:none!important;}

/* ===================== SELECT (朝の空ロビー) ===================== */
#selectScreen{position:absolute;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  padding:30px 22px;overflow-y:auto;overflow-x:hidden;touch-action:manipulation;
  background:linear-gradient(180deg,#bfe6ff 0%,#d8f0ff 34%,#ecf6ff 58%,#fff1e2 100%);}

/* 空の装飾 */
#skyDecor{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
#sun{position:absolute;top:7%;left:50%;width:118px;height:118px;border-radius:50%;
  transform:translateX(-50%);
  background:radial-gradient(circle at 50% 50%,#fff7e2 0%,#ffe4ab 44%,rgba(255,214,130,0) 72%);
  animation:sunGlow 6.5s ease-in-out infinite;}
#sun::before{content:"";position:absolute;inset:-20px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,236,190,.45) 0%,rgba(255,236,190,0) 70%);}
@keyframes sunGlow{0%,100%{transform:translateX(-50%) scale(1);opacity:.92}50%{transform:translateX(-50%) scale(1.07);opacity:1}}

/* きらめき */
.twinkle{position:absolute;width:14px;height:14px;z-index:1;opacity:.8;animation:tw 3.4s ease-in-out infinite;}
.twinkle::before,.twinkle::after{content:"";position:absolute;background:#fff;border-radius:2px;box-shadow:0 0 7px rgba(255,255,255,.95);}
.twinkle::before{left:50%;top:0;width:2px;height:100%;transform:translateX(-50%);}
.twinkle::after{top:50%;left:0;height:2px;width:100%;transform:translateY(-50%);}
@keyframes tw{0%,100%{opacity:.2;transform:scale(.6)}50%{opacity:.85;transform:scale(1)}}
.t1{top:17%;left:21%;animation-delay:0s;}
.t2{top:31%;right:19%;animation-delay:1.2s;}
.t3{top:12%;right:33%;animation-delay:2.3s;}

/* 朝の野原（地平線の丘） */
.hill{position:absolute;left:50%;transform:translateX(-50%);border-radius:50%;z-index:0;}
.hillBack{width:180vw;height:280px;bottom:-160px;background:rgba(196,228,180,.5);}
.hillFront{width:155vw;height:240px;bottom:-130px;background:rgba(176,217,156,.62);}
.cloud{position:absolute;background:rgba(255,255,255,.9);border-radius:999px;
  box-shadow:0 10px 26px rgba(150,200,235,.16);opacity:.9;}
.cloud::before,.cloud::after{content:"";position:absolute;background:inherit;border-radius:50%;}
.cloud1{width:118px;height:32px;top:19%;left:-160px;animation:drift 40s linear infinite;}
.cloud2{width:88px;height:25px;top:44%;left:-160px;animation:drift 56s linear infinite;animation-delay:-12s;}
.cloud3{width:150px;height:40px;top:70%;left:-200px;animation:drift 70s linear infinite;animation-delay:-30s;}
.cloud1::before{width:58px;height:58px;left:14px;top:-26px;}
.cloud1::after{width:44px;height:44px;right:16px;top:-18px;}
.cloud2::before{width:42px;height:42px;left:10px;top:-20px;}
.cloud2::after{width:34px;height:34px;right:12px;top:-13px;}
.cloud3::before{width:72px;height:72px;left:20px;top:-34px;}
.cloud3::after{width:52px;height:52px;right:18px;top:-21px;}
@keyframes drift{0%{transform:translateX(0)}100%{transform:translateX(calc(100vw + 360px))}}

#selectInner{position:relative;z-index:2;width:min(500px,100%);margin:auto;
  display:flex;flex-direction:column;align-items:center;gap:18px;}

/* 挨拶 */
#lobbyHead{text-align:center;}
#selectTitle{font-family:"Yomogi","Kosugi Maru",cursive;font-size:40px;font-weight:700;color:#4f88a4;
  letter-spacing:.04em;line-height:1.08;text-shadow:0 2px 0 rgba(255,255,255,.65);}
#lobbySub{font-size:13px;color:#7aa7bd;letter-spacing:.08em;margin-top:7px;}

/* ヒーロー: スタンプカード（1枚だけふわっと） */
.modeCard{position:relative;width:min(320px,82%);margin:4px 0 26px;cursor:pointer;
  background:none;border:none;padding:0;appearance:none;-webkit-appearance:none;outline:none;
  display:flex;align-items:center;justify-content:center;
  animation:heroBob 4.6s ease-in-out infinite;touch-action:manipulation;-webkit-touch-callout:none;}
@keyframes heroBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.modeCard>*{pointer-events:none;}
.randomTodayCircle,.randomTodayLabel{pointer-events:auto!important;}
.modePreview{position:relative;width:100%;border-radius:24px;overflow:hidden;
  background:rgba(255,255,255,.94);border:3px solid #fff;padding:14px;
  box-shadow:0 24px 46px rgba(120,180,220,.34);transition:transform .25s,box-shadow .25s;}
.modeCard:hover .modePreview{transform:scale(1.02);box-shadow:0 28px 56px rgba(120,180,220,.42);}
.modePreview img{display:block;width:100%;max-height:46vh;object-fit:contain;border-radius:14px;}
.modeLabel{position:absolute;left:50%;bottom:-16px;transform:translateX(-50%);z-index:5;white-space:nowrap;
  padding:13px 30px;border-radius:999px;color:#fff;font-size:17px;font-weight:700;letter-spacing:.08em;
  background:linear-gradient(135deg,#ffa6c8,#ff86b4);border:2.5px solid rgba(255,255,255,.8);
  box-shadow:0 12px 26px rgba(255,140,180,.42);transition:transform .22s;}
.modeCard:hover .modeLabel{transform:translateX(-50%) translateY(-2px);}
.randomTodayCircle{position:absolute;top:-16px;right:-12px;width:86px;height:86px;border-radius:50%;
  background:rgba(255,255,255,.96);border:3px solid #fff;padding:11px;z-index:6;overflow:hidden;cursor:pointer;
  display:flex;align-items:center;justify-content:center;box-shadow:0 10px 22px rgba(120,180,220,.32);
  transition:transform .2s;}
.randomTodayCircle:hover{transform:scale(1.07);}
.randomTodayCircle img{width:100%;height:100%;object-fit:contain;}
.randomTodayLabel{position:absolute;top:76px;right:-8px;z-index:6;font-size:10px;color:#7ca8bd;
  background:rgba(255,255,255,.92);padding:4px 10px;border-radius:999px;cursor:pointer;
  box-shadow:0 5px 12px rgba(120,180,220,.22);}

/* ===================== HOME CHIPS（連続記録・図鑑・今日） ===================== */
#homeStats{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;width:100%;}
.homeStat{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:18px;
  background:rgba(255,255,255,.72);border:1.5px solid rgba(255,255,255,.85);
  backdrop-filter:blur(10px);box-shadow:0 7px 18px rgba(120,180,220,.16);
  appearance:none;-webkit-appearance:none;cursor:default;transition:transform .2s,box-shadow .2s;}
.homeStatBtn{cursor:pointer;}
.homeStatBtn:hover{transform:translateY(-2px);box-shadow:0 11px 24px rgba(120,180,220,.26);}
.homeStatIcon{font-size:19px;line-height:1;}
.homeStatMain{font-size:15px;font-weight:700;color:#4d7790;letter-spacing:.02em;}
.homeStatMain .homeStatUnit{font-size:11px;font-weight:700;margin-left:1px;color:#6c9fb6;}
#streakStat .homeStatMain{color:#ef8a4d;}
#todayStat.done{background:rgba(186,238,210,.72);border-color:rgba(150,220,185,.85);}
#todayStat.done .homeStatMain{color:#34a672;}

/* ===================== HOME GATE（日の出トラック） ===================== */
#homeGate{width:100%;display:flex;flex-direction:column;gap:9px;padding:2px 6px;
  background:none;border:none;box-shadow:none;}
#homeGateTop{display:flex;align-items:baseline;justify-content:center;gap:9px;flex-wrap:wrap;}
#homeGateText{font-size:12.5px;font-weight:700;color:#6f9fb6;letter-spacing:.04em;}
#homeGate.open #homeGateText{color:#34a672;}
#homeGateRemain{font-size:15px;font-weight:700;color:#4d7790;letter-spacing:.02em;white-space:nowrap;}
#homeGate.open #homeGateRemain{font-size:14px;color:#34a672;}
#homeGateBarWrap{position:relative;width:100%;height:3px;border-radius:999px;
  background:rgba(120,170,200,.26);}
#homeGateBar{position:relative;height:100%;width:0%;border-radius:999px;transition:width .5s;
  background:linear-gradient(90deg,rgba(255,212,140,.45),#ffc46e);}
#homeGateSun{position:absolute;right:-9px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;
  background:radial-gradient(circle,#fff7e2 0%,#ffce78 72%);box-shadow:0 0 11px 3px rgba(255,200,120,.55);}
#homeGate.open #homeGateBar{background:linear-gradient(90deg,rgba(130,215,175,.5),#5ec79a);}
#homeGate.open #homeGateSun{background:radial-gradient(circle,#eafff4 0%,#74dcae 72%);box-shadow:0 0 13px 4px rgba(110,210,165,.6);}

/* ===================== エラー帯 ===================== */
#fatalBar{position:fixed;left:0;right:0;bottom:0;z-index:9999;display:none;
  padding:10px 14px;font-size:12px;line-height:1.5;color:#fff;
  background:rgba(212,76,76,.95);font-family:var(--font);
  max-height:42vh;overflow:auto;white-space:pre-wrap;word-break:break-all;}

/* ===================== 図鑑 ===================== */
#dexPopup{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;
  background:rgba(220,240,255,.32);backdrop-filter:blur(10px);}
#dexPopup.visible{display:flex;}
#dexBox{width:min(560px,94vw);max-height:90vh;overflow-y:auto;border-radius:28px;padding:26px;
  background:rgba(255,255,255,.94);border:1px solid rgba(143,220,255,.36);
  box-shadow:0 30px 70px rgba(111,205,255,.22);backdrop-filter:blur(18px);}
#dexHeader{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
#dexTitle{font-size:20px;font-weight:700;color:#5c93ad;letter-spacing:.1em;}
#dexClose{width:34px;height:34px;border:none;border-radius:999px;background:rgba(143,220,255,.14);
  color:#5c93ad;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#dexProgressWrap{width:100%;height:12px;border-radius:999px;overflow:hidden;background:rgba(143,220,255,.16);margin-bottom:6px;}
#dexProgressBar{height:100%;width:0%;border-radius:999px;
  background:linear-gradient(90deg,rgba(143,220,255,.65),rgba(99,204,255,.98));transition:width .6s;}
#dexProgressText{text-align:center;font-size:12px;color:#7aa5bc;font-weight:700;margin-bottom:16px;letter-spacing:.06em;}
#dexGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:12px;}
.dexCell{position:relative;aspect-ratio:1;border-radius:18px;display:flex;align-items:center;justify-content:center;
  background:rgba(143,220,255,.10);border:1.5px solid rgba(143,220,255,.22);padding:14px 8px 26px;overflow:hidden;}
.dexCell.got{background:rgba(195,238,255,.45);border-color:rgba(99,204,255,.42);
  box-shadow:0 6px 16px rgba(99,204,255,.16);}
.dexCell img{width:100%;height:100%;object-fit:contain;}
.dexCell.locked img{filter:grayscale(1) brightness(1.7) opacity(.32);}
.dexQ{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:700;color:rgba(120,165,188,.6);}

/* ===================== TOAST ===================== */
.toast{position:absolute;left:50%;top:64px;transform:translate(-50%,-12px);z-index:300;
  padding:12px 22px;border-radius:999px;font-size:15px;font-weight:700;letter-spacing:.06em;color:#3f7d97;
  background:rgba(255,255,255,.92);border:1.5px solid rgba(143,220,255,.46);
  box-shadow:0 12px 30px rgba(99,204,255,.30);backdrop-filter:blur(14px);
  opacity:0;transition:opacity .35s,transform .35s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translate(-50%,0);}

/* ===================== アニメーション色々 ===================== */
@keyframes badgeBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes uploadPulse{0%,100%{transform:translateY(0) scale(1);box-shadow:0 10px 28px rgba(111,205,255,.34)}
  50%{transform:translateY(-2px) scale(1.12);box-shadow:0 14px 34px rgba(99,204,255,.62)}}
#uploadArea.hl{animation:uploadPulse 1.1s ease-in-out infinite;}
@keyframes circleWobble{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
.randomTodayCircle img{animation:circleWobble 3.4s ease-in-out infinite;}
@keyframes shakeX{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}
  60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shakeX .42s ease-in-out;}
@keyframes stampPop{0%{opacity:0;transform:translate(-50%,-50%) rotate(var(--rot,0deg)) scale(.3)}
  60%{opacity:1;transform:translate(-50%,-50%) rotate(var(--rot,0deg)) scale(1.18)}
  100%{transform:translate(-50%,-50%) rotate(var(--rot,0deg)) scale(1)}}
.stamp.pop{animation:stampPop .42s ease-out;}
@keyframes homeStatIn{0%{opacity:0;transform:translateY(8px) scale(.92)}100%{opacity:1;transform:translateY(0) scale(1)}}
.homeStat{animation:homeStatIn .5s ease-out both;}
.homeStat:nth-child(2){animation-delay:.08s;}
.homeStat:nth-child(3){animation-delay:.16s;}

/* ===================== 今日のスタンプ ？ ===================== */
#todayQ{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:54px;font-weight:700;color:rgba(99,180,225,.6);pointer-events:none;
  animation:badgeBounce 1.6s ease-in-out infinite;}

/* ===================== ルーレット ===================== */
#rouletteScreen{position:fixed;inset:0;z-index:150;display:none;align-items:center;justify-content:center;
  background:rgba(210,238,255,.62);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
#rouletteScreen.visible{display:flex;}
#rouletteInner{display:flex;flex-direction:column;align-items:center;gap:18px;padding:24px;}
#rouletteTitle{font-size:20px;font-weight:700;color:#4d7790;letter-spacing:.12em;
  text-shadow:0 1px 10px rgba(255,255,255,.7);animation:titlePulse 1.4s ease-in-out infinite;}
@keyframes titlePulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.06);opacity:1}}
#wheelWrap{position:relative;width:min(78vw,360px);height:min(78vw,360px);}
#wheelSvg{width:100%;height:100%;filter:drop-shadow(0 16px 40px rgba(99,204,255,.4));
  border-radius:50%;background:rgba(255,255,255,.5);}
#wheelG{transform-origin:50% 50%;}
#wheelPointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);z-index:3;
  width:0;height:0;border-left:15px solid transparent;border-right:15px solid transparent;
  border-top:26px solid #ff6faf;filter:drop-shadow(0 3px 5px rgba(255,120,180,.5));}
#wheelHub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;
  width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.92);
  border:3px solid rgba(99,204,255,.6);box-shadow:0 4px 14px rgba(99,204,255,.4);}
#rouletteResult{font-size:26px;font-weight:700;color:#3ab8ee;letter-spacing:.1em;min-height:34px;
  opacity:0;transform:translateY(8px) scale(.8);transition:opacity .4s,transform .4s;
  text-shadow:0 2px 12px rgba(143,220,255,.8);}
#rouletteResult.show{opacity:1;transform:translateY(0) scale(1);}
#rouletteStart{margin-top:2px;padding:14px 44px;border:none;border-radius:999px;cursor:pointer;
  background:linear-gradient(135deg,#3ab8f5,#63ccff);color:#fff;font-size:18px;font-weight:700;letter-spacing:.16em;
  box-shadow:0 10px 28px rgba(99,204,255,.5);transition:transform .2s;animation:badgeBounce 1.2s ease-in-out infinite;}
#rouletteStart:hover{transform:translateY(-2px);}
#rouletteStart:active{transform:scale(.96);}
#rouletteSkipBtn{display:none;margin-top:2px;padding:8px 22px;border:none;border-radius:999px;cursor:pointer;
  background:rgba(255,255,255,.72);border:1.5px solid rgba(143,220,255,.4);color:#5e93ad;
  font-size:13px;font-weight:700;letter-spacing:.08em;box-shadow:0 4px 14px rgba(111,205,255,.18);transition:transform .2s;}
#rouletteSkipBtn:hover{transform:translateY(-1px);background:rgba(255,255,255,.92);}

/* ===================== 新スタンプお披露目 ===================== */
#newStampScreen{position:fixed;inset:0;z-index:160;display:none;align-items:center;justify-content:center;
  background:rgba(210,238,255,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:24px;}
#newStampScreen.visible{display:flex;}
#newStampBox{width:min(460px,94vw);max-height:88vh;overflow-y:auto;border-radius:28px;padding:28px 24px;
  background:rgba(255,255,255,.95);border:1.5px solid rgba(143,220,255,.4);
  box-shadow:0 30px 70px rgba(111,205,255,.26);display:flex;flex-direction:column;align-items:center;gap:8px;}
#newStampTitle{font-size:20px;font-weight:700;color:#4d7790;letter-spacing:.08em;
  animation:titlePulse 1.4s ease-in-out infinite;}
#newStampSub{font-size:12px;color:#8ab0c4;letter-spacing:.04em;margin-bottom:8px;}
#newStampGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:14px;width:100%;}
.newStampCard{aspect-ratio:.85;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  background:linear-gradient(135deg,rgba(195,238,255,.6),rgba(143,220,255,.4));
  border:1.5px solid rgba(99,204,255,.4);box-shadow:0 6px 18px rgba(99,204,255,.2);}
.newStampQ{font-size:38px;font-weight:700;color:rgba(99,180,225,.8);animation:badgeBounce 1.5s ease-in-out infinite;}
.newStampName{font-size:11px;font-weight:700;color:#4d7790;letter-spacing:.02em;text-align:center;padding:0 4px;}
#newStampOk{margin-top:14px;padding:12px 44px;border:none;border-radius:999px;cursor:pointer;
  background:linear-gradient(135deg,#3ab8f5,#63ccff);color:#fff;font-size:16px;font-weight:700;letter-spacing:.14em;
  box-shadow:0 8px 22px rgba(99,204,255,.46);transition:transform .2s;}
#newStampOk:hover{transform:translateY(-2px);}
#rouletteScreen.reveal #wheelSvg{animation:wheelGlow 1.4s ease-in-out;}
@keyframes wheelGlow{0%,100%{filter:drop-shadow(0 16px 40px rgba(99,204,255,.4))}
  50%{filter:drop-shadow(0 0 36px rgba(255,210,120,.95)) drop-shadow(0 16px 40px rgba(99,204,255,.6))}}

/* ===================== 図鑑（ワクワク強化） ===================== */
.dexStars{position:absolute;top:4px;left:0;right:0;text-align:center;font-size:11px;
  color:#ffb24d;letter-spacing:1px;text-shadow:0 1px 2px rgba(255,160,40,.4);pointer-events:none;}
.dexCell.locked .dexStars{color:rgba(150,180,200,.5);text-shadow:none;}
.dexDate{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:8px;
  color:#8ab8cc;font-weight:700;pointer-events:none;}
.dexName{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:9.5px;
  color:#5e93ad;font-weight:700;pointer-events:none;padding:0 3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dexCell.locked .dexName{color:rgba(120,165,188,.65);}
.dexCell.got{position:relative;overflow:hidden;}
.dexCell.got::after{content:"";position:absolute;top:-60%;left:-60%;width:60%;height:220%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.75),transparent);
  transform:rotate(18deg);animation:dexShine 3.2s ease-in-out infinite;pointer-events:none;}
@keyframes dexShine{0%,72%{left:-60%}88%,100%{left:160%}}
.dexCell.rare{border-color:rgba(255,190,90,.7);
  background:linear-gradient(135deg,rgba(255,236,200,.6),rgba(255,210,150,.45));
  box-shadow:0 6px 20px rgba(255,180,80,.32);}
.dexCell.rare .dexStars{color:#ff9a3d;}

/* ===================== TASK SCREEN ===================== */
#taskScreen{position:absolute;inset:0;z-index:50;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(215,238,255,.48);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
#taskScreen.visible{display:flex;}
#taskContainer{width:min(1260px,100%);padding:0 8px 20px;display:flex;flex-direction:column;gap:16px;}
#taskTitle{text-align:center;font-size:20px;font-weight:700;color:#5c93ad;letter-spacing:.14em;
  text-shadow:0 1px 8px rgba(255,255,255,.7);}

#taskCarouselArea{display:flex;align-items:center;gap:6px;}
.taskNavBtn{width:38px;height:38px;flex:0 0 38px;border:none;border-radius:50%;cursor:pointer;
  background:rgba(255,255,255,.76);border:1.5px solid rgba(143,220,255,.40);
  backdrop-filter:blur(10px);color:#5e93ad;font-size:18px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(111,205,255,.18);transition:.2s;}
.taskNavBtn:hover{background:rgba(255,255,255,.96);transform:scale(1.10);}
.taskNavBtn:disabled{opacity:.22;cursor:default;transform:none;}
#taskCarousel{flex:1;overflow:hidden;min-width:0;}
#taskTrack{display:flex;transition:transform .42s cubic-bezier(.4,0,.2,1);}

.taskCard{flex:0 0 auto;border-radius:22px;overflow:hidden;cursor:default;
  background:rgba(255,255,255,.74);border:1.5px solid rgba(143,220,255,.24);
  box-shadow:0 10px 28px rgba(111,205,255,.14);
  padding:16px 10px 14px;
  display:flex;flex-direction:column;align-items:center;gap:9px;}
.taskCard.center{background:rgba(195,238,255,.80);border-color:rgba(99,204,255,.50);
  box-shadow:0 14px 36px rgba(99,204,255,.26);transform:scale(1.04);z-index:1;}
.taskCardImgWrap{width:60px;height:60px;border-radius:14px;overflow:hidden;
  background:rgba(143,220,255,.16);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.taskCardImgWrap img{width:100%;height:100%;object-fit:contain;}
.taskCardImgPh{font-size:34px;line-height:1;}
.taskCardName{font-size:14px;font-weight:700;color:#4d7790;letter-spacing:.06em;text-align:center;}
.taskCardTime{font-size:10px;color:#8ab8cc;letter-spacing:.06em;margin-top:-4px;}
.taskCardBtns{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;margin-top:auto;}
.taskBtnChallenge{width:100%;padding:10px 0;border:none;border-radius:14px;cursor:pointer;
  background:linear-gradient(135deg,#3ab8f5,#63ccff);
  color:white;font-size:16px;font-weight:700;letter-spacing:.12em;
  box-shadow:0 6px 18px rgba(99,204,255,.40);transition:.2s;}
.taskBtnChallenge:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(99,204,255,.54);}
.taskBtnDone{padding:5px 16px;border:none;border-radius:999px;cursor:pointer;
  background:rgba(255,255,255,.62);border:1.5px solid rgba(143,220,255,.30);
  color:#7ab8d4;font-size:11px;letter-spacing:.06em;transition:.2s;}
.taskBtnDone:hover{background:rgba(255,255,255,.90);}

/* ===================== CHALLENGE SCREEN ===================== */
#challengeScreen{position:absolute;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  background:rgba(215,238,255,.58);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
#challengeScreen.visible{display:flex;}
#challengeBox{width:min(460px,90vw);border-radius:28px;padding:36px 28px 28px;
  background:rgba(255,255,255,.94);border:1.5px solid rgba(143,220,255,.38);
  box-shadow:0 30px 70px rgba(111,205,255,.24);
  display:flex;flex-direction:column;align-items:center;gap:16px;}
#chlTaskName{font-size:28px;font-weight:700;color:#4d7790;letter-spacing:.10em;}
#chlTimeLabel{font-size:13px;color:#8ab8cc;letter-spacing:.06em;}
#chlDesc{font-size:14px;color:#7aacbe;text-align:center;line-height:1.8;letter-spacing:.04em;white-space:pre-line;}
#chlDoneBtn{width:100%;padding:16px 0;border:none;border-radius:18px;cursor:pointer;
  background:linear-gradient(135deg,#3ab8f5,#63ccff);
  color:white;font-size:18px;font-weight:700;letter-spacing:.14em;
  box-shadow:0 8px 24px rgba(99,204,255,.46);transition:.2s;margin-top:8px;}
#chlDoneBtn:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(99,204,255,.58);}
#chlBackBtn{padding:9px 22px;border:none;border-radius:999px;cursor:pointer;
  background:rgba(255,255,255,.64);border:1.5px solid rgba(143,220,255,.32);
  color:#7ab8d4;font-size:13px;letter-spacing:.06em;transition:.2s;}
#chlBackBtn:hover{background:rgba(255,255,255,.90);}

/* ===================== CALENDAR ===================== */
#calendarPopup{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;
  background:rgba(220,240,255,.32);backdrop-filter:blur(10px);}
#calendarPopup.visible{display:flex;}
#calendarBox{width:min(640px,94vw);max-height:90vh;overflow-y:auto;border-radius:28px;padding:28px;
  background:rgba(255,255,255,.94);border:1px solid rgba(143,220,255,.36);
  box-shadow:0 30px 70px rgba(111,205,255,.22);backdrop-filter:blur(18px);}
#calendarHeader{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
#calendarMonth{font-size:20px;font-weight:700;color:#5c93ad;letter-spacing:.1em;}
#calendarClose{width:34px;height:34px;border:none;border-radius:999px;background:rgba(143,220,255,.14);
  color:#5c93ad;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#calendarGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.calDow{text-align:center;font-size:11px;color:#8ab0c4;padding:4px 0;font-weight:700;}
.calDow:first-child{color:#e08080;}.calDow:last-child{color:#80a8e0;}
.calDay{display:flex;flex-direction:column;align-items:center;border-radius:14px;padding:6px 2px;min-height:72px;
  background:rgba(255,255,255,.56);border:1px solid rgba(143,220,255,.14);}
.calDay.empty{background:transparent;border-color:transparent;}
.calDay.today{background:rgba(143,220,255,.20);border-color:rgba(143,220,255,.40);}
.calDayNum{font-size:12px;color:#7aa5bc;font-weight:700;margin-bottom:4px;}
.calDaySun .calDayNum{color:#e08080;}.calDaySat .calDayNum{color:#80a8e0;}
.calDayStamp{width:44px;height:44px;}.calDayStamp img{width:100%;height:100%;object-fit:contain;}

/* ===================== TIME GATE ===================== */
#timeGate{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  width:min(760px,calc(100vw - 54px));min-height:84px;z-index:80;border-radius:28px;
  padding:12px 16px;background:rgba(255,255,255,.74);border:1px solid rgba(143,220,255,.30);
  backdrop-filter:blur(18px);display:none;align-items:center;gap:14px;}
#timeGate.visible{display:flex;}
#gateCardThumb{width:58px;height:58px;border-radius:14px;background:rgba(143,220,255,.10);
  border:1px solid rgba(143,220,255,.18);overflow:hidden;flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
#gateCardThumb img{width:100%;height:100%;object-fit:cover;}
#gateInfo{min-width:0;flex:1;display:flex;flex-direction:column;gap:8px;}
#gateTopLine{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
#gateTitle{font-size:13px;letter-spacing:.08em;color:#79a7bc;font-weight:700;white-space:nowrap;}
#gateHours{font-size:13px;color:#86aabc;white-space:nowrap;}
#gateRemain{font-size:22px;font-weight:700;color:#4d7790;letter-spacing:.02em;white-space:nowrap;}
#progressWrap{width:100%;height:12px;border-radius:999px;overflow:hidden;background:rgba(143,220,255,.14);position:relative;}
#progressBar{position:absolute;inset:0 auto 0 0;width:0%;border-radius:999px;
  background:linear-gradient(90deg,rgba(143,220,255,.55),rgba(99,204,255,.96));transition:width .5s;}

/* ===================== MAIN SCREEN ===================== */
#mainScreen{position:absolute;inset:0;z-index:10;}
#backToSelect{position:absolute;left:20px;top:18px;z-index:13;padding:10px 16px;
  border:none;border-radius:999px;color:#6e9db4;cursor:pointer;display:none;font-size:13px;
  background:rgba(255,255,255,.62);border:1.5px solid rgba(143,220,255,.28);
  backdrop-filter:blur(12px);box-shadow:0 4px 14px rgba(111,205,255,.14);transition:.2s;}
#backToSelect:hover{background:rgba(255,255,255,.82);}

/* Top-right bar: 朝夜 + download + upload */
#uploadWrap{position:absolute;right:20px;top:18px;z-index:14;display:flex;align-items:center;gap:10px;}

/* 右上: DL / 読み込み のアイコンだけのボタン2つ */
.topIconBtn{width:46px;height:46px;border-radius:50%;border:1.5px solid rgba(143,220,255,.5);
  background:rgba(255,255,255,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);cursor:pointer;
  display:flex;align-items:center;justify-content:center;position:relative;
  box-shadow:0 6px 16px rgba(111,205,255,.22);transition:transform .2s,background .2s,opacity .2s;}
.topIconBtn:hover{transform:translateY(-1px);background:rgba(255,255,255,.98);}
.topIconBtn svg{width:22px;height:22px;}
.topIconBtn.used{opacity:.45;}
.topIconBtn input{display:none;}
#imageInput{display:none;}

/* カード準備画面 */
#cardMenuScreen{position:fixed;inset:0;z-index:170;display:none;align-items:center;justify-content:center;
  background:rgba(200,234,255,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:22px;overflow-y:auto;}
#cardMenuScreen.visible{display:flex;}
#cardMenuBox{width:min(360px,94vw);border-radius:28px;padding:22px 22px 24px;margin:auto;
  background:rgba(255,255,255,.97);border:1.5px solid rgba(143,220,255,.4);
  box-shadow:0 30px 70px rgba(111,205,255,.26);display:flex;flex-direction:column;align-items:center;gap:12px;}
#cardMenuHeader{display:flex;align-items:center;justify-content:space-between;width:100%;}
#cardMenuTitle{font-size:18px;font-weight:700;color:#5c93ad;letter-spacing:.08em;}
#cardMenuClose{height:30px;padding:0 15px;border:none;border-radius:999px;background:rgba(143,220,255,.16);
  color:#5c93ad;font-size:12.5px;font-weight:700;letter-spacing:.04em;cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;}

.cardStep{width:100%;border-radius:20px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:10px;
  background:rgba(238,248,255,.7);border:1.5px solid rgba(143,220,255,.28);}
.cardStepLabel{align-self:flex-start;font-size:12px;font-weight:700;color:#5f93ab;letter-spacing:.04em;}
.cardStepOr{font-size:11px;color:#9bbacb;font-weight:700;letter-spacing:.1em;}

#dlBubble{position:relative;width:100%;display:flex;flex-direction:column;align-items:center;gap:6px;}
#dlBubbleImg{width:100%;max-width:200px;height:118px;object-fit:contain;border-radius:12px;
  background:#fff;border:1.5px solid rgba(143,220,255,.3);box-shadow:0 4px 14px rgba(111,205,255,.14);}
#dlBubble span{font-size:11px;color:#7aa5bc;font-weight:700;text-align:center;letter-spacing:.02em;}

#getCardBtn,#uploadArea{width:100%;height:46px;padding:0 16px;gap:7px;border-radius:999px;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;letter-spacing:.04em;
  cursor:pointer;transition:transform .2s,box-shadow .2s,background .3s;outline:none;border:none;position:relative;}
#getCardBtn{background:linear-gradient(135deg,#4dc8ff,#63ccff,#8fdcff);
  box-shadow:0 6px 18px rgba(99,204,255,.42),0 0 0 2px rgba(255,255,255,.7);}
#getCardBtn:hover{transform:translateY(-2px) scale(1.03);}
#getCardBtn.used{background:linear-gradient(135deg,#b0bec5,#c4cdd2,#d0d8dc);box-shadow:0 4px 12px rgba(0,0,0,.1),0 0 0 2px rgba(255,255,255,.7);}
#uploadArea{background:#ff9ec2;box-shadow:0 4px 12px rgba(255,150,185,.26);}
#uploadArea:hover{transform:translateY(-2px) scale(1.03);}
#uploadArea.used{background:#c9bcc4;box-shadow:0 3px 9px rgba(0,0,0,.08);}
#getCardBtn span,#uploadArea span{white-space:nowrap;}
#getCardBtn svg,#uploadArea svg{width:20px;height:20px;flex:0 0 auto;}

/* STAGE */
#stageWrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  padding:100px 32px 58px;transition:filter .3s,opacity .3s;}
#stageWrap.closed{filter:blur(8px) saturate(.92);opacity:.82;}
#stage{position:relative;width:min(82vw,1120px);height:min(72vh,780px);
  display:flex;align-items:center;justify-content:center;}
#emptyHint{position:absolute;z-index:1;font-size:20px;letter-spacing:.10em;color:#87adc2;opacity:.62;pointer-events:none;}
#imageFrame{position:relative;max-width:100%;max-height:100%;border-radius:18px;overflow:visible;touch-action:none;}

/* 画像：水色の縁 */
#cardImage{display:none;width:auto;height:auto;max-width:min(82vw,1120px);max-height:min(72vh,780px);
  object-fit:contain;border-radius:18px;
  box-shadow:0 28px 60px rgba(111,205,255,.15), 0 0 0 2.5px rgba(99,204,255,.55);
  pointer-events:none;-webkit-user-drag:none;}

#stampLayer{position:absolute;inset:0;overflow:hidden;border-radius:18px;pointer-events:none;}
.stamp{position:absolute;transform:translate(-50%,-50%) rotate(var(--rot,0deg));
  transform-origin:center;opacity:.98;pointer-events:none;filter:drop-shadow(0 6px 12px rgba(111,205,255,.12));}
.stamp img{display:block;width:100%;height:100%;object-fit:contain;pointer-events:none;-webkit-user-drag:none;}
.stamp-date{position:absolute;left:50%;transform:translateX(-50%);color:#63ccff;white-space:nowrap;
  letter-spacing:.06em;text-align:center;font-weight:700;pointer-events:none;
  text-shadow:0 1px 4px rgba(200,235,255,.7);opacity:.9;}
#ghostStamp{position:absolute;transform:translate(-50%,-50%);pointer-events:none;opacity:.22;display:none;z-index:4;}
#ghostStamp img{width:100%;height:100%;object-fit:contain;display:block;}
#pressTarget{position:absolute;inset:0;border-radius:18px;background:transparent;z-index:5;cursor:crosshair;touch-action:none;}
#cardControls{position:absolute;inset:0;pointer-events:none;z-index:8;}

/* 朝参加/夜参加ラベル（画像左上） */
#participationLabel{position:absolute;top:10px;left:12px;z-index:7;
  color:rgba(255,255,255,.92);font-size:11px;font-weight:700;letter-spacing:.12em;
  text-shadow:0 1px 5px rgba(0,0,0,.38);pointer-events:none;
  opacity:0;transition:opacity .4s;white-space:nowrap;display:none;}
#participationLabel.visible{display:block;opacity:1;}

/* ↶↷↓ ボタン（画像左下）・より白い半透明 */
#historyControls{position:absolute;bottom:12px;left:12px;display:flex;gap:8px;pointer-events:auto;align-items:center;}
.historyBtn{width:42px;height:42px;border:none;border-radius:999px;
  background:rgba(255,255,255,.90);border:1.5px solid rgba(255,255,255,.72);
  backdrop-filter:blur(10px);color:rgba(75,120,145,.82);font-size:20px;cursor:pointer;
  transition:.2s;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(111,205,255,.10);}
.historyBtn:hover{background:rgba(255,255,255,.98);transform:translateY(-1px);}
.historyBtn:disabled{opacity:.28;cursor:default;transform:none;}
#saveBtn{height:42px;padding:0 16px;gap:7px;border:none;border-radius:999px;
  background:linear-gradient(135deg,#3ab8f5,#63ccff);cursor:pointer;pointer-events:auto;
  transition:background .2s,transform .2s,box-shadow .2s;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;letter-spacing:.06em;
  box-shadow:0 6px 18px rgba(99,204,255,.45);}
#saveBtn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(99,204,255,.58);}
#saveBtn svg{width:18px;height:18px;}

/* スタンプ後 保存ボタン点滅アニメーション */
@keyframes savePulse{
  0%  {transform:scale(1.00);box-shadow:0 4px 14px rgba(111,205,255,.10);}
  45% {transform:scale(1.18);box-shadow:0 8px 22px rgba(99,204,255,.42);}
  100%{transform:scale(1.00);box-shadow:0 4px 14px rgba(111,205,255,.10);}
}
#saveBtn.pulsing{animation:savePulse 1.5s ease-in-out infinite;}

/* Press ring */
#pressRing{position:absolute;width:112px;height:112px;transform:translate(-50%,-50%);
  display:none;align-items:center;justify-content:center;pointer-events:none;z-index:9;}
#pressRing svg{width:112px;height:112px;overflow:visible;}
.ring-bg{stroke:rgba(255,255,255,.75);stroke-width:8;fill:rgba(255,255,255,.10);}
.ring-progress{stroke:#63ccff;stroke-width:8;fill:none;stroke-linecap:round;
  transform:rotate(-90deg);transform-origin:50% 50%;stroke-dasharray:251.2;stroke-dashoffset:251.2;}
.ring-center{fill:rgba(255,255,255,.50);stroke:rgba(143,220,255,.24);stroke-width:1.5;}

/* Bottom left: SNS */
#bottomLeftBar{position:absolute;left:20px;bottom:58px;z-index:14;display:flex;align-items:center;gap:10px;}
#snsBtn{padding:10px 18px;border:none;border-radius:999px;cursor:pointer;
  background:rgba(255,255,255,.70);border:1.5px solid rgba(143,220,255,.34);
  backdrop-filter:blur(12px);color:#5e93ad;font-size:13px;letter-spacing:.08em;
  box-shadow:0 6px 18px rgba(111,205,255,.16);transition:.2s;display:flex;align-items:center;gap:6px;}
#snsBtn:hover{transform:translateY(-1px);}

/* 右下: いつでも開くボタン（透明・見えないけど押せる。選択画面のみ） */
#forceOpenBtn{position:fixed;right:6px;bottom:54px;z-index:101;display:none;
  width:96px;height:54px;border:none;cursor:pointer;
  background:transparent;color:transparent;box-shadow:none;font-size:0;
  -webkit-tap-highlight-color:transparent;}
#forceOpenBtn:hover,#forceOpenBtn:active{transform:none;background:transparent;}

/* BGM BAR */
#bgmBar{position:absolute;right:0;bottom:0;
  width:clamp(170px,26vw,310px);height:46px;z-index:92;
  background:rgba(99,190,240,.20);backdrop-filter:blur(12px);
  border-top:1px solid rgba(143,220,255,.28);border-left:1px solid rgba(143,220,255,.18);
  border-radius:14px 0 0 0;
  display:flex;align-items:center;padding:0 14px;gap:10px;}
#bgmIcon{position:relative;font-size:16px;color:#7ab8d4;flex:0 0 auto;cursor:pointer;
  transition:color .2s;line-height:1;display:inline-block;width:18px;text-align:center;}
#bgmIcon:hover{color:#3ab8ee;}
#bgmIcon::after{content:"";position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%) rotate(-42deg);width:2px;height:140%;
  background:rgba(210,50,50,.82);border-radius:1px;opacity:0;transition:opacity .18s;pointer-events:none;}
#bgmIcon.muted::after{opacity:1;}
#bgmTrack{flex:1;height:6px;border-radius:999px;background:rgba(143,220,255,.22);position:relative;cursor:pointer;touch-action:none;}
#bgmFill{height:100%;border-radius:999px;background:linear-gradient(90deg,#8fdcff,#63ccff);width:10%;pointer-events:none;transition:width .06s;}
#bgmThumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;
  background:linear-gradient(135deg,#8fdcff,#40c0f0);border:2.5px solid #fff;
  box-shadow:0 2px 10px rgba(99,204,255,.42);left:10%;cursor:grab;transition:left .06s;}
#bgmPct{font-size:11px;color:#7ab8d4;min-width:28px;text-align:right;flex:0 0 auto;}

/* RESPONSIVE */
@media(prefers-reduced-motion:reduce){
  #sun,.cloud,.twinkle,.modeCard,.randomTodayCircle img{animation:none!important;}
}
@media(max-width:780px){
  #selectScreen{padding:24px 16px;}
  #selectTitle{font-size:32px;}
  #lobbySub{font-size:12px;}
  #sun{width:94px;height:94px;top:5%;}
  .modeCard{width:min(290px,86%);}
  .modeLabel{font-size:15px;padding:11px 24px;}
  .randomTodayCircle{width:74px;height:74px;top:-12px;right:-8px;}
  .randomTodayLabel{top:66px;}
  #stageWrap{padding:90px 14px 58px;}#timeGate{width:calc(100vw - 28px);}
  #bottomLeftBar{font-size:12px;left:16px;bottom:52px;}
  #snsBtn{font-size:12px;padding:8px 14px;}
}
</style>
</head>

  const ctx=ensureCtx();if(!ctx)return;
  const now=ctx.currentTime;
  [0,0.17].forEach(t=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type="square";o.frequency.value=150;
    g.gain.setValueAtTime(0.0001,now+t);
    g.gain.exponentialRampToValueAtTime(0.20,now+t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,now+t+0.14);
    o.connect(g);g.connect(ctx.destination);
    o.start(now+t);o.stop(now+t+0.16);
  });
}

/* =========================================================
   時刻：端末のローカル時間（＝本人の地元の時間）で判定する。
   timeZoneを指定しないことで、見てる人それぞれの時間になる。
   → 日本の人は日本の朝6:00〜8:00、アメリカの人はアメリカの朝6:00〜8:00に開く。
   （関数名にjstが残ってるけど中身はローカル時間です）
   ========================================================= */
function jstParts(){
  const p={};
  new Intl.DateTimeFormat("en-CA",{year:"numeric",month:"2-digit",
    day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false})
    .formatToParts(new Date()).filter(x=>x.type!=="literal").forEach(x=>p[x.type]=x.value);
  return{Y:+p.year,M:+p.month,D:+p.day,h:+p.hour,m:+p.minute,s:+p.second};
}
function jstKey(){const p=jstParts();return`${p.Y}-${String(p.M).padStart(2,"0")}-${String(p.D).padStart(2,"0")}`;}
function jstDisp(){const p=jstParts();return`${p.M}/${p.D}`;}
function mod(h,m){return h*60+m;}
function fmtHM(h,m){return`${h}:${String(m).padStart(2,"0")}`;}
function jstStatus(){
  const p=jstParts(),now=mod(p.h,p.m),op=mod(JST_OH,JST_OM),cl=mod(JST_CH,JST_CM);
  const bt=now>=op&&now<cl,open=bt||ovOpen;
  let rem=0,prog=0;
  if(bt){
    /* 開いてる間：残りは閉門まで、バーは満タン */
    const el=(now-op)*60+p.s,tot=(cl-op)*60;
    rem=Math.max(0,(tot-el)*1000);prog=100;
  }else{
    /* 閉まってる間：次の朝の開門までカウントダウン。
       閉門〜翌開門の総時間に対する経過でバーを満たす＝開門が近いほどバーが伸びる */
    const closedTotalSec=((1440-cl)+op)*60;            // 例:8:00→翌6:00=22時間
    const remMin=now<op?(op-now):((1440-now)+op);      // 開門までの残り分
    rem=Math.max(0,(remMin*60-p.s)*1000);
    const elapsedSec=closedTotalSec-Math.ceil(rem/1000);
    prog=clamp(elapsedSec/closedTotalSec*100,0,100);
  }
  return{open,bt,rem,prog};
}
function fmtRem(ms){
  const tm=Math.max(0,Math.ceil(ms/60000)),h=Math.floor(tm/60),m=tm%60;
  return h>0?`あと ${h}時間 ${m}分`:`あと ${m}分`;
}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function weights(){return(WEIGHTS.length===POOL.length)?WEIGHTS:POOL.map(()=>1);}
/* 一度出た（持ってる）スタンプは面積＝確率を半分にして、新しいのが出やすくする */
function dynWeights(){const b=weights(),col=getCollected();return POOL.map((s,i)=>col.has(s)?b[i]*0.5:b[i]);}
function stampName(src){const i=POOL.indexOf(src);return(i>=0&&STAMP_NAMES[i])?STAMP_NAMES[i]:"スタンプ";}
/* 新スタンプお披露目用：見たスタンプを記録。初回は今あるPOOLを全部「既知」にして、後から追加された分だけ告知 */
const SEEN_KEY="radio_seen_stamps";
function getSeen(){try{const v=JSON.parse(localStorage.getItem(SEEN_KEY)||"null");return Array.isArray(v)?v:null;}catch(e){return null;}}
function addSeen(srcs){const s=new Set(getSeen()||[]);srcs.forEach(x=>s.add(x));localStorage.setItem(SEEN_KEY,JSON.stringify([...s]));}
function unseenStamps(){
  const seen=getSeen();
  if(seen===null){localStorage.setItem(SEEN_KEY,JSON.stringify(POOL.slice()));return[];}
  return POOL.filter(s=>!seen.includes(s));
}
function getStampMap(){try{const v=JSON.parse(localStorage.getItem(STAMP_MAP_KEY)||"{}");return(v&&typeof v==="object")?v:{};}catch(e){return{};}}
function saveStampMap(m){localStorage.setItem(STAMP_MAP_KEY,JSON.stringify(m));}
function stampForDate(dk){const m=getStampMap();return m[dk]||null;}   /* その日のスタンプ（無ければnull） */
function todayStamp(){return stampForDate(jstKey());}
function pickStampIdx(){
  const w=dynWeights(),total=w.reduce((a,b)=>a+b,0);let r=Math.random()*total;
  for(let i=0;i<w.length;i++){r-=w[i];if(r<=0)return i;}
  return w.length-1;
}
function assignTodayStamp(idx){const m=getStampMap();m[jstKey()]=POOL[idx];saveStampMap(m);return POOL[idx];}
function refreshTodayPreview(){
  const s=todayStamp(),q=$("todayQ");
  if(s){todayPrv.style.display="";todayPrv.src=s;if(q)q.style.display="none";}

}

function buildCal(){
  const p=jstParts(),y=p.Y,mo=p.M;
  calMonth.textContent=`${y}年${mo}月`;
  const dim=new Date(y,mo,0).getDate(),fd=new Date(y,mo-1,1).getDay();
  const doneSet=new Set(getDoneDates());
  calGrid.innerHTML="";
  ["日","月","火","水","木","金","土"].forEach(d=>{
    const e=document.createElement("div");e.className="calDow";e.textContent=d;calGrid.appendChild(e);
  });
  for(let i=0;i<fd;i++){const e=document.createElement("div");e.className="calDay empty";calGrid.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const dk=`${y}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}`,dow=(fd+d-1)%7,it=d===p.D;
    const el=document.createElement("div");
    el.className="calDay"+(it?" today":"")+(dow===0?" calDaySun":dow===6?" calDaySat":"");
    const nd=document.createElement("div");nd.className="calDayNum";nd.textContent=d;el.appendChild(nd);
    /* 自分が達成した日にだけ、その日のスタンプを表示（未来や未達成日は空） */
    const s=doneSet.has(dk)?stampForDate(dk):null;
    if(s){
      const sd=document.createElement("div");sd.className="calDayStamp";
      const img=document.createElement("img");img.src=s;sd.appendChild(img);el.appendChild(sd);
    }
    calGrid.appendChild(el);
  }
}

function layoutCarousel(){
  const cw=document.getElementById("taskCarousel").clientWidth;
  if(!cw)return;
  const vis=getVisibleCount();
  const cardW=(cw-CAROUSEL_GAP*(vis-1))/vis;
  document.querySelectorAll(".taskCard").forEach(c=>{
    c.style.width=`${cardW}px`;
    c.style.marginRight=`${CAROUSEL_GAP}px`;
  });
  applyCarouselSlide(carouselOffset,false);
  taskPrevBtn.disabled=carouselOffset<=0;
  taskNextBtn.disabled=carouselOffset>=TASKS.length-vis;
}

function applyCarouselSlide(offset,animate=true){
  const cw=document.getElementById("taskCarousel").clientWidth;
  if(!cw)return;
  const vis=getVisibleCount();
  const cardW=(cw-CAROUSEL_GAP*(vis-1))/vis;
  const step=cardW+CAROUSEL_GAP;
  carouselOffset=offset;
  taskTrack.style.transition=animate?"transform .42s cubic-bezier(.4,0,.2,1)":"none";
  taskTrack.style.transform=`translateX(${-offset*step}px)`;
  taskPrevBtn.disabled=offset<=0;
  taskNextBtn.disabled=offset>=TASKS.length-vis;
}

function showTaskScreen(){
  taskScreen.classList.add("visible");
  carouselOffset=0;
  requestAnimationFrame(()=>{
    buildTaskCards();
    layoutCarousel();
  });
}
function hideTaskScreen(){taskScreen.classList.remove("visible");}

taskPrevBtn.addEventListener("click",()=>{
  if(carouselOffset>0){playClick();applyCarouselSlide(carouselOffset-1);}
});
taskNextBtn.addEventListener("click",()=>{
  const vis=getVisibleCount();
  if(carouselOffset<TASKS.length-vis){playClick();applyCarouselSlide(carouselOffset+1);}
});

async function setCard(src){
  cardPath=src;cardImg.src=src;cardImg.style.display="block";emptyHint.style.display="none";
  setGateThumb(src);
  /* onloadだけ待つと404画像でPromiseが永久に止まる → onerrorでも抜ける */
  await new Promise(r=>{cardImg.onload=r;cardImg.onerror=r;if(cardImg.complete)r();});
  renderStamps();

}

function clearStamps(){stamps=[];redo=[];renderStamps();updHistory();}
function updHistory(){undoBtn.disabled=!stamps.length;redoBtn.disabled=!redo.length;}
function cardRect(){const r=cardImg.getBoundingClientRect();return{l:r.left,t:r.top,w:r.width,h:r.height};}
function inCard(cx,cy){const r=cardRect();return cx>=r.l&&cx<=r.l+r.w&&cy>=r.t&&cy<=r.t+r.h;}
function toRatio(cx,cy){const r=cardRect();return{x:clamp((cx-r.l)/r.w,0,1),y:clamp((cy-r.t)/r.h,0,1)};}
function updateGhostSize(){const r=cardRect();if(!r.w||!stampPath)return;const sz=Math.max(38,r.w*0.17);ghost.style.width=`${sz}px`;ghost.style.height=`${sz}px`;}

function renderStamps(animateLast){
  stampLayer.innerHTML="";const rect=cardRect();if(!rect.w||!rect.h)return;
  stamps.forEach((s,i)=>{
    const el=document.createElement("div");el.className="stamp";
    if(animateLast&&i===stamps.length-1)el.classList.add("pop");
    el.style.left=`${s.x*100}%`;el.style.top=`${s.y*100}%`;
    const sz=Math.max(38,rect.w*(s.size||0.17));el.style.width=`${sz}px`;el.style.height=`${sz}px`;
    el.style.setProperty("--rot",`${s.rot||0}deg`);
    const img=document.createElement("img");img.src=s.src;el.appendChild(img);
    const de=document.createElement("div");de.className="stamp-date";de.textContent=s.date||jstDisp();
    de.style.fontSize=`${Math.max(9,sz*0.18)}px`;de.style.bottom=`${-sz*0.14}px`;el.appendChild(de);
    stampLayer.appendChild(el);
  });
}
function showGhost(cx,cy){if(!stampPath)return;const r=cardRect();if(!r.w)return;ghostImg.src=stampPath;const sz=Math.max(38,r.w*0.17);ghost.style.width=`${sz}px`;ghost.style.height=`${sz}px`;moveGhost(cx,cy);ghost.style.display="block";}
function moveGhost(cx,cy){const r=cardRect();ghost.style.left=`${cx-r.l}px`;ghost.style.top=`${cy-r.t}px`;ghost.style.transform="translate(-50%,-50%)";}
function hideGhost(){ghost.style.display="none";}

function pushStamp(xr,yr){
  stamps.push({x:clamp(xr,0,1),y:clamp(yr,0,1),rot:(-10+Math.random()*20).toFixed(2),size:0.17,src:stampPath,date:jstDisp()});
  redo=[];renderStamps(true);updHistory();
  stampSnd.currentTime=0;stampSnd.play().catch(()=>{});
  startSavePulse();
  /* 今日の達成として記録 → 連続記録・図鑑に反映 */
  const r=markTodayDone();
  if(r.added){
    refreshHome();
    const{current}=calcStreak();
    if(r.newStamp)toast("✨ あたらしいスタンプGET！");
    else if(current>1)toast(`🔥 ${current}日連続！`);
    else toast("今日のスタンプ、おつかれさま！");
  }
}
function undoS(){if(!stamps.length)return;redo.push(stamps.pop());renderStamps();updHistory();}
function redoS(){if(!redo.length)return;stamps.push(redo.pop());renderStamps();updHistory();}

function showRing(cx,cy){const r=stage.getBoundingClientRect();pressRing.style.left=`${cx-r.left}px`;pressRing.style.top=`${cy-r.top}px`;pressRing.style.display="flex";ringProg.style.strokeDashoffset="251.2";}
function moveRing(cx,cy){const r=stage.getBoundingClientRect();pressRing.style.left=`${cx-r.left}px`;pressRing.style.top=`${cy-r.top}px`;}
function hideRing(){pressRing.style.display="none";ringProg.style.strokeDashoffset="251.2";}
function animRing(){
  if(!pAnim)return;const ratio=clamp((performance.now()-pStart)/LONG_MS,0,1);
  ringProg.style.strokeDashoffset=String(251.2*(1-ratio));
  if(ratio>=1){pAnim=false;hideRing();if(pPt)pushStamp(pPt.x,pPt.y);hideGhost();return;}
  rAF=requestAnimationFrame(animRing);
}
function cancelPress(){pDown=false;pId=null;pAnim=false;pPt=null;if(pTimer){clearTimeout(pTimer);pTimer=null;}if(rAF){cancelAnimationFrame(rAF);rAF=null;}hideRing();hideGhost();}
function startPress(cx,cy){
  if(!activeWin||!cardPath||!stampPath||!inCard(cx,cy))return;
  if(stamps.length>=1){buzz();return;}   /* 1日1個まで。2回目はブブー。↶で戻せばまた押せる */
  pPt=toRatio(cx,cy);showGhost(cx,cy);pStart=performance.now();pAnim=true;showRing(cx,cy);animRing();pTimer=setTimeout(()=>{pTimer=null;},LONG_MS);
}
function movePress(cx,cy){if(!pDown)return;if(!inCard(cx,cy)){cancelPress();return;}moveRing(cx,cy);pPt=toRatio(cx,cy);moveGhost(cx,cy);}

async function loadImg(src){return new Promise((res,rej)=>{const i=new Image();i.crossOrigin="anonymous";i.onload=()=>res(i);i.onerror=rej;i.src=src;});}

/* =========================================================
   保存（朝参加/夜参加をcanvasに描画）
   ========================================================= */
async function savePNG(){
  if(!cardPath)return;
  const base=await loadImg(cardImg.src);
  const oc=document.createElement("canvas");const ctx=oc.getContext("2d");
  oc.width=base.naturalWidth||base.width;oc.height=base.naturalHeight||base.height;
  const W=oc.width,H=oc.height;
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(base,0,0,W,H);

  for(const s of stamps){
    const img=await loadImg(s.src);const sz=W*(s.size||0.17),cx=s.x*W,cy=s.y*H;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(+s.rot*Math.PI/180);ctx.drawImage(img,-sz/2,-sz/2,sz,sz);
    const fs=Math.max(9,sz*0.18);
    ctx.font=`bold ${fs}px "Kosugi Maru","Yomogi",sans-serif`;
    ctx.fillStyle="rgba(99,204,255,.9)";ctx.textAlign="center";ctx.textBaseline="top";
    ctx.shadowColor="rgba(200,235,255,.7)";ctx.shadowBlur=4;
    ctx.fillText(s.date||jstDisp(),0,sz/2+2);ctx.shadowBlur=0;ctx.restore();
  }

  /* 隠し機能: 朝参加/夜参加を左上に描画 */
  const labelTxt=todIsNight?"夜参加":"朝参加";
  const fs2=Math.max(12,H*0.022);
  ctx.font=`bold ${fs2}px "Kosugi Maru","Yomogi",sans-serif`;
  ctx.fillStyle="rgba(255,255,255,.92)";
  ctx.shadowColor="rgba(0,0,0,.42)";ctx.shadowBlur=6;
  ctx.textAlign="left";ctx.textBaseline="top";
  ctx.fillText(labelTxt,Math.round(W*0.018),Math.round(H*0.018));
  ctx.shadowBlur=0;

  const today=jstKey();
  const a=document.createElement("a");a.href=oc.toDataURL("image/png");
  a.download=`radio-stamp-${today}.png`;document.body.appendChild(a);a.click();a.remove();
}

function dlCard(src,name){const a=document.createElement("a");a.href=src;a.download=name;document.body.appendChild(a);a.click();a.remove();}

  setCard(RAND_CARD);

  /* 毎回ルーレットを回せる。ただし2回目以降は1回目と同じ結果（引き直し不可） */

  let idx;

/* =========================================================
   ルーレット：その日のスタンプを抽選で決める演出
   ========================================================= */
const SVGNS="http://www.w3.org/2000/svg";
function polTop(cx,cy,r,degTop){const a=(degTop-90)*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}
function arcPath(cx,cy,r,a0,a1){
  const[x0,y0]=polTop(cx,cy,r,a0),[x1,y1]=polTop(cx,cy,r,a1),lg=(a1-a0)>180?1:0;
  return`M${cx} ${cy} L${x0} ${y0} A${r} ${r} 0 ${lg} 1 ${x1} ${y1} Z`;
}
let wheelSegs=[];
/* 文字をセグメント基準で配置。回転して当選が上で止まったとき水平＆正立になる。
   dominant-baselineはスマホで効かないことがあるので dy で縦中央寄せ */
function addSegText(g,cx,cy,radius,mid,txt,fontSize,fill,id){
  const t=document.createElementNS(SVGNS,"text");
  t.setAttribute("x",cx);t.setAttribute("y",cy-radius);
  t.setAttribute("text-anchor","middle");t.setAttribute("dy","0.35em");
  t.setAttribute("font-size",fontSize);t.setAttribute("font-weight","700");t.setAttribute("fill",fill);
  t.setAttribute("transform",`rotate(${mid} ${cx} ${cy})`);
  if(id)t.setAttribute("id",id);
  t.textContent=txt;g.appendChild(t);
  return t;
}
function buildWheel(winnerIdx){
  const w=dynWeights(),total=w.reduce((a,b)=>a+b,0);
  const g=$("wheelG");g.innerHTML="";wheelSegs=[];
  const cx=100,cy=100,r=96;let acc=0;
  const fills=["rgba(143,220,255,.55)","rgba(99,204,255,.8)","rgba(180,235,255,.62)","rgba(120,210,250,.72)","rgba(160,228,255,.5)","rgba(110,196,245,.66)"];
  POOL.forEach((src,i)=>{
    const frac=w[i]/total,a0=acc*360,a1=(acc+frac)*360,mid=(a0+a1)/2;acc+=frac;
    wheelSegs.push({i,src,mid});
    const p=document.createElementNS(SVGNS,"path");
    p.setAttribute("d",arcPath(cx,cy,r,a0,a1));
    p.setAttribute("fill",fills[i%fills.length]);
    p.setAttribute("stroke","rgba(255,255,255,.75)");p.setAttribute("stroke-width","1.5");
    g.appendChild(p);
    /* 当選スタンプ画像（？と同じ位置・同じ回転基準＝上で止まったとき正立） */
    if(i===winnerIdx){
      const sz=r*0.4;
      const im=document.createElementNS(SVGNS,"image");
      im.setAttribute("href",src);im.setAttributeNS("http://www.w3.org/1999/xlink","href",src);
      im.setAttribute("x",cx-sz/2);im.setAttribute("y",(cy-r*0.5)-sz/2);
      im.setAttribute("width",sz);im.setAttribute("height",sz);
      im.setAttribute("transform",`rotate(${mid} ${cx} ${cy})`);
      im.setAttribute("id","wheelWinImg");im.style.opacity="0";g.appendChild(im);
    }
    /* ？（中心寄り）と 名前（その外）を扇の中におさめる */
    addSegText(g,cx,cy,r*0.5,mid,"？",22,"rgba(255,255,255,.95)",i===winnerIdx?"wheelWinQ":null);
    addSegText(g,cx,cy,r*0.74,mid,stampName(src),8.5,"rgba(60,120,150,.92)",null);
  });
}
let rouletteSkip=null;
function openRoulette(winnerIdx,onDone){
  rouletteSkip=null;
  buildWheel(winnerIdx);
  const rs=$("rouletteScreen");rs.classList.remove("reveal");rs.classList.add("visible");
  $("rouletteTitle").textContent="今日のスタンプは…？";
  const rr=$("rouletteResult");rr.textContent="";rr.classList.remove("show");
  const g=$("wheelG");g.style.transition="none";g.style.transform="rotate(0deg)";
  $("rouletteSkipBtn").style.display="none";
  const sb=$("rouletteStart");sb.style.display="";sb.disabled=false;
  sb.onclick=(e)=>{e.stopPropagation();sb.style.display="none";spinWheel(winnerIdx,onDone);};
}
function spinWheel(winnerIdx,onDone){
  const g=$("wheelG"),rs=$("rouletteScreen"),rr=$("rouletteResult");
  void g.offsetWidth;
  const winner=wheelSegs[winnerIdx],finalRot=360*6-winner.mid;
  requestAnimationFrame(()=>{
    g.style.transition="transform 5.4s cubic-bezier(.1,.74,.16,1)";
    g.style.transform=`rotate(${finalRot}deg)`;
    startSpinSound(5.4);
  });
  $("rouletteSkipBtn").style.display="";
  let done=false,revealTimer=null;
  const finish=()=>{
    if(done)return;done=true;rouletteSkip=null;
    clearSpinSound();
    if(revealTimer){clearTimeout(revealTimer);revealTimer=null;}
    $("rouletteSkipBtn").style.display="none";
    g.style.transition="none";g.style.transform=`rotate(${finalRot}deg)`;   /* スキップ時は即最終位置へ */
    const wq=$("wheelWinQ"),wi=$("wheelWinImg");
    if(wq){wq.style.transition="opacity .25s";wq.style.opacity="0";}
    if(wi){wi.style.transition="opacity .3s";wi.style.opacity="1";}
    rs.classList.add("reveal");
    rr.textContent=`✨ ${stampName(POOL[winnerIdx])} GET！`;rr.classList.add("show");
    winSound();
    if(typeof onDone==="function")onDone(POOL[winnerIdx]);
    setTimeout(()=>{rs.classList.remove("visible","reveal");},1400);
  };
  rouletteSkip=finish;
  revealTimer=setTimeout(finish,5650);
}
/* クリック or スキップボタンで演出を飛ばす（回転中のみ有効） */
$("rouletteSkipBtn").addEventListener("click",()=>{if(rouletteSkip)rouletteSkip();});
$("rouletteScreen").addEventListener("click",()=>{if(rouletteSkip)rouletteSkip();});

/* =========================================================
   習慣化：連続記録（ストリーク）・スタンプ図鑑・今日の達成
   ========================================================= */
function getDoneDates(){
  try{const v=JSON.parse(localStorage.getItem(DONE_KEY)||"[]");return Array.isArray(v)?v:[];}
  catch(e){return[];}
}
function addDays(key,delta){
  const d=new Date(key+"T00:00:00Z");d.setUTCDate(d.getUTCDate()+delta);
  return d.toISOString().slice(0,10);
}
/* 今日を達成として記録。戻り値で「初記録か」「新スタンプか」を返す */
function markTodayDone(){
  const dates=getDoneDates(),today=jstKey();
  if(dates.includes(today))return{added:false};
  const before=getCollected();
  dates.push(today);
  localStorage.setItem(DONE_KEY,JSON.stringify(dates));
  const st=stampForDate(today);
  return{added:true,newStamp:!before.has(st),stamp:st};
}
function calcStreak(){
  const set=new Set(getDoneDates()),today=jstKey(),y=addDays(today,-1);
  let base=set.has(today)?today:(set.has(y)?y:null),cur=0;
  if(base){let k=base;while(set.has(k)){cur++;k=addDays(k,-1);}}
  const sorted=[...set].sort();
  let best=0,run=0,prev=null;
  for(const k of sorted){run=(prev&&addDays(prev,1)===k)?run+1:1;if(run>best)best=run;prev=k;}
  return{current:cur,best:Math.max(best,cur)};
}
function getCollected(){return new Set(getDoneDates().map(stampForDate).filter(Boolean));}
function todayDone(){return getDoneDates().includes(jstKey());}

function refreshHomeGate(){
  const st=jstStatus();
  const g=$("homeGate");
  if(st.open){
    g.classList.add("open");
    $("homeGateText").textContent=ovOpen&&!st.bt?"いま ひらいてるよ！（解除中）":"いま ひらいてるよ！";
    $("homeGateRemain").textContent="カードを押してスタート";
    $("homeGateBar").style.width="100%";
  }else{
    g.classList.remove("open");
    $("homeGateText").textContent=`朝 ${fmtHM(JST_OH,JST_OM)}〜${fmtHM(JST_CH,JST_CM)} にひらくよ`;
    $("homeGateRemain").textContent=fmtRem(st.rem);
    $("homeGateBar").style.width=`${clamp(st.prog,0,100)}%`;
  }
}

function refreshHome(){
  refreshHomeGate();
  const{current}=calcStreak();
  $("streakNum").textContent=current;
  const col=getCollected().size;
  $("todexNum").textContent=`${col}/${POOL.length}`;
  const done=todayDone();
  $("todayStatIcon").textContent=done?"✓":"🌙";
  $("todayStatText").textContent=done?"完了！":"今日はまだ";
  $("todayStat").classList.toggle("done",done);
}

function stampFirstDate(src){
  const m=getStampMap(),done=new Set(getDoneDates());
  const days=Object.keys(m).filter(d=>m[d]===src&&done.has(d)).sort();
  return days[0]||null;
}
function buildDex(){
  const col=getCollected(),w=weights(),total=w.reduce((a,b)=>a+b,0);
  dexGrid.innerHTML="";
  POOL.forEach((src,i)=>{
    const got=col.has(src),p=w[i]/total,stars=p<0.12?3:p<0.22?2:1;
    const cell=document.createElement("div");
    cell.className="dexCell"+(got?" got":" locked")+(got&&stars>=3?" rare":"");
    const sc=document.createElement("div");sc.className="dexStars";sc.textContent="★".repeat(stars);cell.appendChild(sc);
    const img=document.createElement("img");img.src=src;img.alt="";cell.appendChild(img);
    if(got){
      const fd=stampFirstDate(src);
      if(fd){const d=document.createElement("div");d.className="dexDate";d.textContent=fd.slice(5).replace("-","/");cell.appendChild(d);}
    }else{
      const q=document.createElement("div");q.className="dexQ";q.textContent="？";cell.appendChild(q);
    }
    const nm=document.createElement("div");nm.className="dexName";nm.textContent=stampName(src);cell.appendChild(nm);
    dexGrid.appendChild(cell);
  });
  const pct=POOL.length?Math.round(col.size/POOL.length*100):0;
  $("dexProgressBar").style.width=`${pct}%`;
  $("dexProgressText").textContent=col.size>=POOL.length
    ?`★ コンプリート！ ${col.size}/${POOL.length} ★`
    :`${col.size} / ${POOL.length} コンプ（${pct}%）`;
}
dexBtn.addEventListener("click",e=>{e.stopPropagation();playClick();buildDex();dexPop.classList.add("visible");});
dexCloseBtn.addEventListener("click",()=>{playClick();dexPop.classList.remove("visible");});

/* 達成フィードバック用トースト */
let toastTimer=null;
function toast(txt){
  const old=document.querySelector(".toast");if(old)old.remove();
  const t=document.createElement("div");t.className="toast";t.textContent=txt;
  $("app").appendChild(t);
  requestAnimationFrame(()=>t.classList.add("show"));
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),420);},2000);
}
