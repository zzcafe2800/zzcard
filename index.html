<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ラジオ体操スタンプ</title>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --blue:#8fdcff;--blue-s:#63ccff;--text:#55839a;--text-d:#4d7790;
  --glass:rgba(255,255,255,.58);--shadow:0 10px 24px rgba(111,205,255,.12);
  --font:"Yomogi","Zen Maru Gothic","Hiragino Sans","Yu Gothic",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:var(--font);color:var(--text);
  background:linear-gradient(rgba(245,251,255,.72),rgba(245,251,255,.72)),url("hk.jpg") center/cover no-repeat;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,.34),rgba(255,255,255,.05)),
    repeating-linear-gradient(90deg,rgba(255,255,255,0) 0,rgba(255,255,255,0) 54px,rgba(143,220,255,.03) 55px,rgba(143,220,255,.03) 56px);
  opacity:.85;}
button,input{font:inherit;}
#app{position:relative;width:100%;height:100%;overflow:hidden;}
.glass{backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);background:rgba(255,255,255,.58);border:1px solid rgba(143,220,255,.34);box-shadow:var(--shadow);}
.hidden{display:none!important;}

/* SELECT SCREEN */
#selectScreen{position:absolute;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:32px;
  background:linear-gradient(rgba(252,254,255,.78),rgba(241,251,255,.78)),url("hk.jpg") center/cover no-repeat;
  backdrop-filter:blur(8px);touch-action:manipulation;}
#selectInner{width:min(1180px,100%);display:flex;flex-direction:column;gap:22px;}
#selectTitle{text-align:center;color:#5c93ad;font-size:28px;letter-spacing:.12em;font-weight:700;}
#selectWrap{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:stretch;}
.modeCard{position:relative;min-height:470px;border-radius:30px;overflow:hidden;cursor:pointer;
  background:rgba(255,255,255,.58);border:1px solid rgba(143,220,255,.28);
  box-shadow:0 26px 60px rgba(111,205,255,.15);
  transition:transform .28s,box-shadow .28s,border-color .28s;appearance:none;outline:none;}
.modeCard *{pointer-events:none;}
@media(hover:hover)and(pointer:fine){
  .modePreview{opacity:.08;transition:opacity .38s,transform .38s;}
  .modeCard:hover .modePreview{opacity:.92;transform:scale(1.03);}
  .modeLabel{transition:transform .25s,background .25s;}
  .modeCard:hover .modeLabel{transform:translate(-50%,-50%) scale(1.03);background:rgba(255,255,255,.68);}
}
@media(hover:none),(pointer:coarse){.modePreview{opacity:.40;}}
.modePreview{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:22px;pointer-events:none;}
.modePreview img{max-width:100%;max-height:100%;object-fit:contain;border-radius:20px;}
.modeLabel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;
  padding:16px 30px;border-radius:999px;color:var(--text-d);letter-spacing:.12em;font-size:28px;font-weight:700;
  background:rgba(255,255,255,.56);border:1px solid rgba(143,220,255,.26);backdrop-filter:blur(14px);white-space:nowrap;}
.modeCount{position:absolute;left:24px;bottom:22px;z-index:2;padding:10px 14px;border-radius:999px;
  color:#79a6bc;font-size:13px;background:rgba(255,255,255,.42);border:1px solid rgba(143,220,255,.18);}
.randomTodayCircle{position:absolute;right:22px;bottom:22px;width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,.58);border:1px solid rgba(143,220,255,.26);
  display:flex;align-items:center;justify-content:center;padding:18px;z-index:3;overflow:hidden;
  cursor:pointer;pointer-events:auto;transition:transform .2s;}
.randomTodayCircle:hover{transform:scale(1.06);}
.randomTodayCircle img{width:100%;height:100%;object-fit:contain;}
.randomTodayLabel{position:absolute;right:44px;bottom:34px;z-index:4;font-size:11px;
  color:#7ca8bd;background:rgba(255,255,255,.52);padding:6px 10px;border-radius:999px;
  border:1px solid rgba(143,220,255,.18);cursor:pointer;pointer-events:auto;}
.modeDisabled{cursor:not-allowed;opacity:.72;}
.modeDisabled:hover{transform:none!important;}
.modeDisabled .modePreview{opacity:.18!important;transform:none!important;}
.modeDisabled .modeLabel{transform:translate(-50%,-50%)!important;}
.modeDisabled::before,.modeDisabled::after{content:"";position:absolute;left:-12%;width:124%;height:2px;
  background:rgba(94,148,173,.48);top:50%;z-index:3;}
.modeDisabled::before{transform:rotate(19deg);}
.modeDisabled::after{transform:rotate(-19deg);}

/* CALENDAR */
#calendarPopup{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;
  background:rgba(220,240,255,.32);backdrop-filter:blur(10px);}
#calendarPopup.visible{display:flex;}
#calendarBox{width:min(640px,94vw);max-height:90vh;overflow-y:auto;border-radius:28px;padding:28px;
  background:rgba(255,255,255,.92);border:1px solid rgba(143,220,255,.36);
  box-shadow:0 30px 70px rgba(111,205,255,.22);backdrop-filter:blur(18px);}
#calendarHeader{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
#calendarMonth{font-size:20px;font-weight:700;color:#5c93ad;letter-spacing:.1em;}
#calendarClose{width:34px;height:34px;border:none;border-radius:999px;background:rgba(143,220,255,.14);
  color:#5c93ad;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#calendarGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.calDow{text-align:center;font-size:11px;color:#8ab0c4;padding:4px 0;font-weight:700;}
.calDow:first-child{color:#e08080;}.calDow:last-child{color:#80a8e0;}
.calDay{display:flex;flex-direction:column;align-items:center;border-radius:14px;padding:6px 2px;min-height:72px;
  background:rgba(255,255,255,.56);border:1px solid rgba(143,220,255,.14);}
.calDay.empty{background:transparent;border-color:transparent;}
.calDay.today{background:rgba(143,220,255,.18);border-color:rgba(143,220,255,.36);}
.calDayNum{font-size:12px;color:#7aa5bc;font-weight:700;margin-bottom:4px;}
.calDaySun .calDayNum{color:#e08080;}.calDaySat .calDayNum{color:#80a8e0;}
.calDayStamp{width:44px;height:44px;}.calDayStamp img{width:100%;height:100%;object-fit:contain;}

/* TIME GATE */
#timeGate{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  width:min(760px,calc(100vw - 54px));min-height:84px;z-index:80;border-radius:28px;
  padding:12px 16px;background:rgba(255,255,255,.74);border:1px solid rgba(143,220,255,.30);
  backdrop-filter:blur(18px);display:none;align-items:center;gap:14px;}
#timeGate.visible{display:flex;}
#gateCardThumb{width:58px;height:58px;border-radius:14px;background:rgba(143,220,255,.10);
  border:1px solid rgba(143,220,255,.18);overflow:hidden;flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
#gateCardThumb img{width:100%;height:100%;object-fit:cover;}
#gateInfo{min-width:0;flex:1;display:flex;flex-direction:column;gap:8px;}
#gateTopLine{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
#gateTitle{font-size:16px;letter-spacing:.1em;color:#5f91a8;font-weight:700;white-space:nowrap;}
#gateHours{font-size:14px;color:#79a7bc;white-space:nowrap;}
#gateRemain{font-size:13px;color:#86aabc;white-space:nowrap;}
#progressWrap{width:100%;height:12px;border-radius:999px;overflow:hidden;background:rgba(143,220,255,.14);position:relative;}
#progressBar{position:absolute;inset:0 auto 0 0;width:0%;border-radius:999px;
  background:linear-gradient(90deg,rgba(143,220,255,.55),rgba(99,204,255,.96));transition:width .5s;}

/* MAIN SCREEN */
#mainScreen{position:absolute;inset:0;z-index:10;}
#backToSelect{position:absolute;left:20px;top:18px;z-index:13;padding:10px 14px;
  border:none;border-radius:999px;color:#6e9db4;cursor:pointer;display:none;}

/* Upload button — right top, with 新規 badge */
#uploadWrap{position:absolute;right:20px;top:18px;z-index:14;}
#uploadArea{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:#8fdcff;border:2px solid rgba(255,255,255,.5);cursor:pointer;
  transition:transform .2s,box-shadow .2s;overflow:visible;
  box-shadow:0 10px 28px rgba(111,205,255,.30);position:relative;}
#uploadArea:hover{transform:translateY(-2px) scale(1.07);}
#uploadArea input{display:none;}
#uploadArea svg{width:32px;height:32px;}
#newBadge{position:absolute;top:-4px;right:-4px;background:#ff8fb8;color:#fff;
  font-size:9px;font-weight:700;padding:2px 6px;border-radius:999px;
  letter-spacing:.04em;white-space:nowrap;pointer-events:none;font-family:var(--font);}

/* STAGE */
#stageWrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  padding:100px 32px 80px;transition:filter .3s,opacity .3s;}
#stageWrap.closed{filter:blur(8px) saturate(.92);opacity:.82;}
#stage{position:relative;width:min(82vw,1120px);height:min(74vh,780px);
  display:flex;align-items:center;justify-content:center;}
#emptyHint{position:absolute;z-index:1;font-size:20px;letter-spacing:.10em;color:#87adc2;opacity:.62;pointer-events:none;}
#imageFrame{position:relative;max-width:100%;max-height:100%;border-radius:18px;overflow:visible;touch-action:none;}
#cardImage{display:none;width:auto;height:auto;max-width:min(82vw,1120px);max-height:min(74vh,780px);
  object-fit:contain;border-radius:18px;box-shadow:0 28px 60px rgba(111,205,255,.15);
  pointer-events:none;-webkit-user-drag:none;}
#stampLayer{position:absolute;inset:0;overflow:hidden;border-radius:18px;pointer-events:none;}
.stamp{position:absolute;transform:translate(-50%,-50%) rotate(var(--rot,0deg));
  transform-origin:center;opacity:.98;pointer-events:none;filter:drop-shadow(0 6px 12px rgba(111,205,255,.12));}
.stamp img{display:block;width:100%;height:100%;object-fit:contain;pointer-events:none;-webkit-user-drag:none;}
.stamp-date{position:absolute;left:50%;transform:translateX(-50%);color:#63ccff;white-space:nowrap;
  letter-spacing:.06em;text-align:center;font-weight:700;pointer-events:none;
  text-shadow:0 1px 4px rgba(200,235,255,.7);opacity:.9;}
#ghostStamp{position:absolute;transform:translate(-50%,-50%);pointer-events:none;opacity:.22;display:none;z-index:4;}
#ghostStamp img{width:100%;height:100%;object-fit:contain;display:block;}
#pressTarget{position:absolute;inset:0;border-radius:18px;background:transparent;z-index:5;cursor:crosshair;touch-action:none;}
#cardControls{position:absolute;inset:0;pointer-events:none;z-index:8;}

/* Undo/Redo + Download — left top of card */
#historyControls{position:absolute;top:12px;left:12px;display:flex;gap:8px;pointer-events:auto;align-items:center;}
.historyBtn{width:42px;height:42px;border:none;border-radius:999px;
  background:rgba(255,255,255,.66);border:1.5px solid rgba(143,220,255,.34);
  backdrop-filter:blur(10px);color:rgba(75,120,145,.95);font-size:20px;cursor:pointer;
  transition:.2s;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(111,205,255,.16);}
.historyBtn:hover{background:rgba(255,255,255,.84);transform:translateY(-1px);}
.historyBtn:disabled{opacity:.35;cursor:default;transform:none;}

/* Download btn — prominent, right of ↷ */
#getCardBtn{width:50px;height:50px;border-radius:999px;border:none;outline:none;cursor:pointer;
  background:linear-gradient(135deg,#63ccff,#8fdcff);display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 22px rgba(99,204,255,.40);transition:transform .2s,box-shadow .2s;}
#getCardBtn:hover{transform:translateY(-2px) scale(1.10);box-shadow:0 14px 32px rgba(99,204,255,.52);}
#getCardBtn svg{width:24px;height:24px;}

/* Save — left bottom of card */
#saveBtn{position:absolute;left:12px;bottom:12px;width:42px;height:42px;border:none;border-radius:999px;
  background:rgba(255,255,255,.66);border:1.5px solid rgba(143,220,255,.34);
  backdrop-filter:blur(12px);color:#5e93ad;cursor:pointer;pointer-events:auto;
  transition:.2s;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(111,205,255,.16);}
#saveBtn:hover{background:rgba(255,255,255,.84);transform:translateY(-1px);}
#saveBtn svg{width:20px;height:20px;}

/* QR overlay — LEFT BOTTOM of card, small */
#qrOverlay{position:absolute;left:2%;bottom:2%;width:6.5%;aspect-ratio:1;z-index:6;pointer-events:none;opacity:.84;}
#qrOverlay canvas{width:100%;height:100%;image-rendering:pixelated;border-radius:3px;display:block;}

/* Visit count */
#visitCountOverlay{position:absolute;left:11%;bottom:3%;z-index:6;pointer-events:none;
  font-size:clamp(11px,1.4vw,17px);color:#63ccff;font-weight:700;letter-spacing:.08em;
  text-shadow:0 1px 6px rgba(200,235,255,.9);opacity:0;transition:opacity .4s;}
#visitCountOverlay.visible{opacity:1;}

/* Press ring */
#pressRing{position:absolute;width:112px;height:112px;transform:translate(-50%,-50%);
  display:none;align-items:center;justify-content:center;pointer-events:none;z-index:9;}
#pressRing svg{width:112px;height:112px;overflow:visible;}
.ring-bg{stroke:rgba(255,255,255,.75);stroke-width:8;fill:rgba(255,255,255,.10);}
.ring-progress{stroke:#63ccff;stroke-width:8;fill:none;stroke-linecap:round;
  transform:rotate(-90deg);transform-origin:50% 50%;stroke-dasharray:251.2;stroke-dashoffset:251.2;}
.ring-center{fill:rgba(255,255,255,.50);stroke:rgba(143,220,255,.24);stroke-width:1.5;}

/* SNS btn — screen bottom-left */
#snsBtn{position:absolute;left:20px;bottom:58px;z-index:14;
  padding:10px 18px;border:none;border-radius:999px;cursor:pointer;
  background:rgba(255,255,255,.68);border:1.5px solid rgba(143,220,255,.34);
  backdrop-filter:blur(12px);color:#5e93ad;font-size:13px;letter-spacing:.08em;
  box-shadow:0 6px 18px rgba(111,205,255,.16);transition:.2s;display:flex;align-items:center;gap:6px;}
#snsBtn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(111,205,255,.24);}

/* Secret zone */
#secretTapZone{position:absolute;left:0;bottom:44px;width:110px;height:110px;z-index:90;background:transparent;}
#passwordPopup{position:absolute;left:20px;bottom:110px;z-index:95;width:120px;padding:10px;
  border-radius:16px;display:none;background:rgba(255,255,255,.82);
  border:1px solid rgba(143,220,255,.24);backdrop-filter:blur(14px);}
#passwordInput{width:100%;border:none;outline:none;border-radius:12px;padding:10px 12px;
  text-align:center;background:rgba(255,255,255,.56);color:#5c90a8;font-size:18px;letter-spacing:.20em;}
#passwordInput::placeholder{color:transparent;}

/* BGM BAR */
#bgmBar{position:absolute;left:0;right:0;bottom:0;height:44px;z-index:90;
  background:rgba(99,180,230,.16);backdrop-filter:blur(10px);
  border-top:1px solid rgba(143,220,255,.22);
  display:flex;align-items:center;padding:0 20px;gap:10px;}
#bgmIcon{font-size:15px;color:#7ab8d4;flex:0 0 auto;cursor:pointer;transition:.2s;}
#bgmIcon:hover{color:#4db8e8;}
#bgmTrack{flex:1;height:6px;border-radius:999px;background:rgba(143,220,255,.22);position:relative;cursor:pointer;}
#bgmFill{height:100%;border-radius:999px;background:linear-gradient(90deg,#8fdcff,#63ccff);
  width:10%;pointer-events:none;}
#bgmThumb{position:absolute;top:50%;transform:translate(-50%,-50%);
  width:18px;height:18px;border-radius:50%;background:#63ccff;
  border:2px solid #fff;box-shadow:0 2px 8px rgba(99,204,255,.38);left:10%;cursor:grab;}
#bgmPct{font-size:11px;color:#7ab8d4;min-width:28px;text-align:right;flex:0 0 auto;}

/* loading dots */
@keyframes ldot{0%,80%,100%{opacity:.3}40%{opacity:1}}
.ldots span{display:inline-block;animation:ldot 1.2s infinite;}
.ldots span:nth-child(2){animation-delay:.2s;}
.ldots span:nth-child(3){animation-delay:.4s;}

@media(max-width:900px){
  #selectWrap{grid-template-columns:1fr;max-width:580px;}
  .modeCard{min-height:260px;}.modeLabel{font-size:24px;}
  .randomTodayCircle{width:120px;height:120px;right:16px;top:16px;}
  .randomTodayLabel{right:20px;top:144px;}
}
@media(max-width:780px){
  #selectTitle{font-size:22px;}
  #uploadArea{width:56px;height:56px;}
  #stageWrap{padding:90px 14px 80px;}
  #timeGate{width:calc(100vw - 28px);}
  #snsBtn{font-size:12px;padding:8px 14px;left:16px;bottom:52px;}
  #secretTapZone{bottom:44px;}
}
</style>
</head>
<body>
<div id="app">

<!-- SELECT -->
<div id="selectScreen">
  <div id="selectInner">
    <div id="selectTitle">🐱 カードの種類を選択 🐾</div>
    <div id="selectWrap">
      <button class="modeCard modeDisabled" id="artModeBtn" type="button" disabled>
        <div class="modePreview"><img src="art.png" alt=""></div>
        <div class="modeLabel">版画スタンプ</div>
        <div class="modeCount" id="artCountText">カード総数 0</div>
      </button>
      <button class="modeCard" id="randomModeBtn" type="button">
        <div class="modePreview"><img src="randm.png" alt=""></div>
        <div class="modeLabel">スタンプラリー</div>
        <div class="randomTodayCircle" id="todayCircle"><img id="todayStampPreview" src="" alt=""></div>
        <div class="randomTodayLabel" id="todayLabel">今日のスタンプ</div>
        <div class="modeCount" id="randomCountText">スタンプ総数 0</div>
      </button>
    </div>
  </div>
</div>

<!-- CALENDAR -->
<div id="calendarPopup">
  <div id="calendarBox">
    <div id="calendarHeader">
      <div id="calendarMonth"></div>
      <button id="calendarClose" type="button">×</button>
    </div>
    <div id="calendarGrid"></div>
  </div>
</div>

<!-- TIME GATE -->
<div id="timeGate">
  <div id="gateCardThumb"></div>
  <div id="gateInfo">
    <div id="gateTopLine">
      <div id="gateTitle">時間外です</div>
      <div id="gateHours">6:00〜6:30</div>
      <div id="gateRemain">残り --時間 --分</div>
    </div>
    <div id="progressWrap"><div id="progressBar"></div></div>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen">
  <button id="backToSelect" class="glass" type="button">もどる</button>

  <!-- Upload (right-top) with 新規 badge -->
  <div id="uploadWrap">
    <label id="uploadArea" for="imageInput" title="カードを入れてね">
      <svg viewBox="0 0 32 32" fill="none">
        <rect x="5" y="8" width="22" height="16" rx="3" stroke="white" stroke-width="2" fill="none"/>
        <path d="M16 22v-9M12 17l4-4 4 4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="24" cy="10" r="1.5" fill="white" opacity=".7"/>
      </svg>
      <input id="imageInput" type="file" accept="image/*"/>
    </label>
    <div id="newBadge">新規</div>
  </div>

  <!-- SNS -->
  <button id="snsBtn" type="button">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <circle cx="3" cy="8" r="2" fill="#8fdcff"/><circle cx="13" cy="3" r="2" fill="#8fdcff"/><circle cx="13" cy="13" r="2" fill="#8fdcff"/>
      <line x1="5" y1="7" x2="11" y2="4" stroke="#8fdcff" stroke-width="1.4"/><line x1="5" y1="9" x2="11" y2="12" stroke="#8fdcff" stroke-width="1.4"/>
    </svg>
    SNS投稿◯
  </button>

  <div id="stageWrap">
    <div id="stage">
      <div id="emptyHint">CARD</div>
      <div id="imageFrame">
        <img id="cardImage" alt="card">
        <div id="stampLayer"></div>
        <div id="ghostStamp"><img id="ghostStampImg" alt=""></div>
        <div id="qrOverlay"></div>
        <div id="visitCountOverlay"></div>
        <div id="cardControls">
          <div id="historyControls">
            <button id="undoBtn" class="historyBtn" type="button" title="元に戻す">↶</button>
            <button id="redoBtn" class="historyBtn" type="button" title="やり直す">↷</button>
            <button id="getCardBtn" class="hidden" type="button" title="カードをダウンロード">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 17v2a1 1 0 001 1h14a1 1 0 001-1v-2" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M12 4v10M8 10l4 4 4-4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <button id="saveBtn" type="button" title="保存">
            <svg viewBox="0 0 20 20" fill="none">
              <path d="M3 13v3a1 1 0 001 1h12a1 1 0 001-1v-3" stroke="#5e93ad" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M10 3v9M7 9l3 3 3-3" stroke="#5e93ad" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div id="pressTarget"></div>
      </div>
      <div id="pressRing" aria-hidden="true">
        <svg viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="40"/>
          <circle class="ring-progress" cx="50" cy="50" r="40"/>
          <circle class="ring-center" cx="50" cy="50" r="25"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<!-- BGM BAR -->
<div id="bgmBar">
  <span id="bgmIcon" title="BGM ON/OFF">♪</span>

/* ── AUDIO ── */
function playClick(){clickSnd.currentTime=0;clickSnd.play().catch(()=>{});}

function trkPos(e){const r=bgmTrack.getBoundingClientRect(),cx=e.touches?e.touches[0].clientX:e.clientX;return Math.max(0,Math.min(1,(cx-r.left)/r.width));}

/* ── TIME ── */
function jstParts(){
  const p={};new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Tokyo",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).formatToParts(new Date()).filter(x=>x.type!=="literal").forEach(x=>p[x.type]=x.value);
  return{Y:+p.year,M:+p.month,D:+p.day,h:+p.hour,m:+p.minute,s:+p.second};
}
function jstKey(){const p=jstParts();return`${p.Y}-${String(p.M).padStart(2,"0")}-${String(p.D).padStart(2,"0")}`;}
function jstDisp(){const p=jstParts();return`${p.M}/${p.D}`;}
function mod(h,m){return h*60+m;}
function jstStatus(){
  const p=jstParts(),now=mod(p.h,p.m),op=mod(JST_OH,JST_OM),cl=mod(JST_CH,JST_CM);
  const bt=now>=op&&now<cl,open=bt||ovOpen;
  let rem=0,prog=0;
  if(bt){const el=(now-op)*60+p.s,tot=(cl-op)*60;rem=Math.max(0,(tot-el)*1000);prog=100;}
  else{const mu=now<op?op-now:(1440-now)+op;rem=Math.max(0,(mu*60-p.s)*1000);prog=((86400000-rem)/86400000)*100;}
  return{open,bt,rem,prog};
}
function fmtRem(ms){const tm=Math.ceil(ms/60000);return`残り${Math.floor(tm/60)}時間${tm%60}分`;}

/* ── STAMP POOL ── */
function seedIdx(seed,len){const x=Math.sin(seed*9999)*10000;return Math.floor((x-Math.floor(x))*len)%len;}
function stampForDate(dk){return POOL[seedIdx(+dk.replaceAll("-",""),POOL.length)];}
function todayStamp(){return stampForDate(jstKey());}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function updateCounts(){
  randCnt.textContent=`スタンプ総数 ${POOL.length}`;
  artCnt.textContent=`カード総数 ${Object.keys(ART).length}`;
  todayPrv.src=todayStamp();
}

/* ── CALENDAR ── */
function buildCal(){
  const p=jstParts(),y=p.Y,mo=p.M;
  calMonth.textContent=`${y}年${mo}月`;
  const dim=new Date(y,mo,0).getDate(),fd=new Date(y,mo-1,1).getDay();
  calGrid.innerHTML="";
  ["日","月","火","水","木","金","土"].forEach(d=>{const e=document.createElement("div");e.className="calDow";e.textContent=d;calGrid.appendChild(e);});
  for(let i=0;i<fd;i++){const e=document.createElement("div");e.className="calDay empty";calGrid.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const dk=`${y}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}`,dow=(fd+d-1)%7,it=d===p.D;
    const el=document.createElement("div");el.className="calDay"+(it?" today":"")+(dow===0?" calDaySun":dow===6?" calDaySat":"");
    const nd=document.createElement("div");nd.className="calDayNum";nd.textContent=d;el.appendChild(nd);
    const sd=document.createElement("div");sd.className="calDayStamp";
    const img=document.createElement("img");img.src=stampForDate(dk);sd.appendChild(img);el.appendChild(sd);
    calGrid.appendChild(el);
  }
}
function showCal(e){e.stopPropagation();playClick();buildCal();calPop.classList.add("visible");}

/* ── QR ── */
let _qrLib=null;
async function getQR(){
  if(_qrLib)return _qrLib;
  if(window.QRCode){_qrLib=window.QRCode;return _qrLib;}
  return new Promise(res=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";s.onload=()=>{_qrLib=window.QRCode;res(_qrLib);};s.onerror=()=>res(null);document.head.appendChild(s);});
}
async function mkQRCanvas(text,size){
  const lib=await getQR();if(!lib)return null;
  const wrap=document.createElement("div");wrap.style.cssText="position:absolute;left:-9999px;top:-9999px;";document.body.appendChild(wrap);
  try{
    new lib(wrap,{text,width:size,height:size,colorDark:"#3aadda",colorLight:"#ffffff",correctLevel:lib.CorrectLevel.L});
    await new Promise(r=>setTimeout(r,100));
    const inner=wrap.querySelector("canvas")||wrap.querySelector("img");
    const c=document.createElement("canvas");c.width=size;c.height=size;
    const ctx=c.getContext("2d");
    if(inner.tagName==="IMG"){await new Promise(r=>{inner.onload=r;if(inner.complete)r();});}
    ctx.drawImage(inner,0,0,size,size);wrap.remove();return c;
  }catch(e){wrap.remove();return null;}
}
function qrTxt(h){if(!h||!h.length)return"radio-stamp:0";return`radio-stamp:${h.length}|${h.map(x=>`${x.n}:${x.date}`).join("|")}`;}
function parseQR(t){
  if(!t||!t.startsWith("radio-stamp:"))return null;
  const parts=t.slice(12).split("|");if(parts.length<=1)return[];
  const h=[];for(let i=1;i<parts.length;i++){const[n,date]=parts[i].split(":");if(n&&date)h.push({n:+n,date});}return h;
}

/* QR reading with crop-to-region for reliability */
async function detectQR(src){
  if(!("BarcodeDetector" in window))return null;
  try{const det=new BarcodeDetector({formats:["qr_code"]});const codes=await det.detect(src);
    for(const b of codes)if(b.rawValue.startsWith("radio-stamp:"))return parseQR(b.rawValue);
    return null;}catch(e){return null;}
}
async function readQRFromImage(imgEl){
  // Try full image first
  let r=await detectQR(imgEl);if(r!==null)return r;
  // Crop to bottom-left 12% region (where QR lives) and upscale
  try{
    const nw=imgEl.naturalWidth||imgEl.width,nh=imgEl.naturalHeight||imgEl.height;
    if(!nw||!nh)return null;
    const qw=Math.round(nw*0.12),qh=Math.round(nh*0.12);
    const qx=Math.round(nw*0.01),qy=nh-qh-Math.round(nh*0.01);
    const sc=4; // upscale 4x for detector
    const c=document.createElement("canvas");c.width=qw*sc;c.height=qh*sc;
    const ctx=c.getContext("2d");ctx.imageSmoothingEnabled=false;
    ctx.drawImage(imgEl,qx,qy,qw,qh,0,0,qw*sc,qh*sc);
    r=await detectQR(c);if(r!==null)return r;
  }catch(e){}
  return null;
}

async function refreshQROverlay(){
  qrOverlay.innerHTML="";
  const c=await mkQRCanvas(qrTxt(qrHist),72);
  if(c){c.style.cssText="width:100%;height:100%;image-rendering:pixelated;border-radius:3px;display:block;";qrOverlay.appendChild(c);}
}
function setVCLoading(){vcOverlay.innerHTML='<span class="ldots"><span>·</span><span>·</span><span>·</span></span>';vcOverlay.classList.add("visible");}
function updateVC(){
  if(visitN>0){vcOverlay.textContent=`${visitN}日目`;vcOverlay.classList.add("visible");}
  else{vcOverlay.classList.remove("visible");vcOverlay.textContent="";}
}

/* ── SCREEN ── */
function setGateThumb(src){gateThumb.innerHTML=src?`<img src="${src}" alt="">`:"";}
function clearModeSel(){selMode=null;randomBtn.classList.remove("selected");artBtn.classList.remove("selected");}
function showSelect(){selectScreen.classList.remove("hidden");backBtn.style.display="none";timeGate.classList.remove("visible");mode=null;clearModeSel();}
function hideSelect(){selectScreen.classList.add("hidden");backBtn.style.display="block";}
function updateTop(){
  const st=jstStatus();activeWin=st.open;
  if(!mode){timeGate.classList.remove("visible");dlBtn.classList.add("hidden");return;}
  if(st.open)timeGate.classList.remove("visible");
  else{timeGate.classList.add("visible");gateRemain.textContent=fmtRem(st.rem);progBar.style.width=`${clamp(st.prog,0,100)}%`;}
  stageWrap.classList.toggle("closed",!st.open);
  dlBtn.classList.remove("hidden");
}

async function setCard(src){
  cardPath=src;cardImg.src=src;cardImg.style.display="block";emptyHint.style.display="none";setGateThumb(src);
  setVCLoading();
  await new Promise(r=>{cardImg.onload=r;if(cardImg.complete&&cardImg.naturalWidth)r();});
  renderStamps();updateGhostSize();
  const parsed=await readQRFromImage(cardImg);
  if(parsed&&parsed.length>0){
    qrHist=parsed;
    // FIX: visitN = last saved n (how many times card was saved)
    visitN=parsed[parsed.length-1].n;
  }else{
    qrHist=parsed||[];
    visitN=qrHist.length>0?qrHist[qrHist.length-1].n:0;
  }
  updateVC();await refreshQROverlay();
}

function clearStamps(){stamps=[];redo=[];renderStamps();updHistory();}
function updHistory(){undoBtn.disabled=!stamps.length;redoBtn.disabled=!redo.length;}
function cardRect(){const r=cardImg.getBoundingClientRect();return{l:r.left,t:r.top,w:r.width,h:r.height};}
function inCard(cx,cy){const r=cardRect();return cx>=r.l&&cx<=r.l+r.w&&cy>=r.t&&cy<=r.t+r.h;}
function toRatio(cx,cy){const r=cardRect();return{x:clamp((cx-r.l)/r.w,0,1),y:clamp((cy-r.t)/r.h,0,1)};}

function renderStamps(){
  stampLayer.innerHTML="";const rect=cardRect();if(!rect.w||!rect.h)return;
  for(const s of stamps){
    const el=document.createElement("div");el.className="stamp";
    el.style.left=`${s.x*100}%`;el.style.top=`${s.y*100}%`;
    const sz=Math.max(38,rect.w*(s.size||0.17));el.style.width=`${sz}px`;el.style.height=`${sz}px`;el.style.setProperty("--rot",`${s.rot||0}deg`);
    const img=document.createElement("img");img.src=s.src;el.appendChild(img);
    const de=document.createElement("div");de.className="stamp-date";de.textContent=s.date||jstDisp();
    de.style.fontSize=`${Math.max(9,sz*0.18)}px`;de.style.bottom=`${-sz*0.14}px`;el.appendChild(de);
    stampLayer.appendChild(el);
  }
}
function updateGhostSize(){const r=cardRect();if(!r.w||!stampPath)return;const sz=Math.max(38,r.w*0.17);ghost.style.width=`${sz}px`;ghost.style.height=`${sz}px`;}
function showGhost(cx,cy){if(!stampPath)return;const r=cardRect();if(!r.w)return;ghostImg.src=stampPath;const sz=Math.max(38,r.w*0.17);ghost.style.width=`${sz}px`;ghost.style.height=`${sz}px`;moveGhost(cx,cy);ghost.style.display="block";}
function moveGhost(cx,cy){const r=cardRect();ghost.style.left=`${cx-r.l}px`;ghost.style.top=`${cy-r.t}px`;ghost.style.transform="translate(-50%,-50%)";}
function hideGhost(){ghost.style.display="none";}

function pushStamp(xr,yr){
  stamps.push({x:clamp(xr,0,1),y:clamp(yr,0,1),rot:(-10+Math.random()*20).toFixed(2),size:0.17,src:stampPath,date:jstDisp()});
  redo=[];renderStamps();updHistory();stampSnd.currentTime=0;stampSnd.play().catch(()=>{});
}
function undoS(){if(!stamps.length)return;redo.push(stamps.pop());renderStamps();updHistory();}
function redoS(){if(!redo.length)return;stamps.push(redo.pop());renderStamps();updHistory();}

function showRing(cx,cy){const r=stage.getBoundingClientRect();pressRing.style.left=`${cx-r.left}px`;pressRing.style.top=`${cy-r.top}px`;pressRing.style.display="flex";ringProg.style.strokeDashoffset="251.2";}
function moveRing(cx,cy){const r=stage.getBoundingClientRect();pressRing.style.left=`${cx-r.left}px`;pressRing.style.top=`${cy-r.top}px`;}
function hideRing(){pressRing.style.display="none";ringProg.style.strokeDashoffset="251.2";}
function animRing(){
  if(!pAnim)return;const ratio=clamp((performance.now()-pStart)/LONG_MS,0,1);
  ringProg.style.strokeDashoffset=String(251.2*(1-ratio));
  if(ratio>=1){pAnim=false;hideRing();if(pPt)pushStamp(pPt.x,pPt.y);hideGhost();return;}
  rAF=requestAnimationFrame(animRing);
}
function cancelPress(){pDown=false;pId=null;pAnim=false;pPt=null;if(pTimer){clearTimeout(pTimer);pTimer=null;}if(rAF){cancelAnimationFrame(rAF);rAF=null;}hideRing();hideGhost();}
function startPress(cx,cy){if(!activeWin||!cardPath||!inCard(cx,cy))return;pPt=toRatio(cx,cy);showGhost(cx,cy);pStart=performance.now();pAnim=true;showRing(cx,cy);animRing();pTimer=setTimeout(()=>{pTimer=null;},LONG_MS);}
function movePress(cx,cy){if(!pDown)return;if(!inCard(cx,cy)){cancelPress();return;}moveRing(cx,cy);pPt=toRatio(cx,cy);moveGhost(cx,cy);}

async function loadImg(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});}

async function savePNG(){
  if(!cardPath)return;
  const base=await loadImg(cardImg.src);
  const oc=document.createElement("canvas");const ctx=oc.getContext("2d");
  oc.width=base.naturalWidth||base.width;oc.height=base.naturalHeight||base.height;
  const W=oc.width,H=oc.height;
  ctx.drawImage(base,0,0,W,H);
  for(const s of stamps){
    const img=await loadImg(s.src);const sz=W*(s.size||0.17),cx=s.x*W,cy=s.y*H;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(+s.rot*Math.PI/180);ctx.drawImage(img,-sz/2,-sz/2,sz,sz);
    const fs=Math.max(9,sz*0.18);ctx.font=`bold ${fs}px "Yomogi",sans-serif`;ctx.fillStyle="rgba(99,204,255,.9)";ctx.textAlign="center";ctx.textBaseline="top";ctx.shadowColor="rgba(200,235,255,.7)";ctx.shadowBlur=4;ctx.fillText(s.date||jstDisp(),0,sz/2+2);ctx.shadowBlur=0;ctx.restore();
  }

  // FIX: newN = qrHist.length + 1 (correct sequential count)
  const newN=qrHist.length+1;
  const today=jstKey();
  const newHist=[...qrHist,{n:newN,date:today}];

  // QR position on output: left:2%, bottom:2%, size:7% of W (matching CSS display)
  const qsz=Math.round(W*0.07);
  const qx=Math.round(W*0.02),qy=H-qsz-Math.round(H*0.02);

  // Blank old QR area (+margin)
  ctx.fillStyle="#ffffff";ctx.fillRect(qx-5,qy-5,qsz+10,qsz+10);

  const qc=await mkQRCanvas(qrTxt(newHist),qsz);
  if(qc)ctx.drawImage(qc,qx,qy,qsz,qsz);

  qrHist=newHist;visitN=newN;updateVC();await refreshQROverlay();

  const a=document.createElement("a");a.href=oc.toDataURL("image/png");a.download=`radio-stamp-${today}.png`;document.body.appendChild(a);a.click();a.remove();
}
function dlCard(src,name){const a=document.createElement("a");a.href=src;a.download=name;document.body.appendChild(a);a.click();a.remove();}

function setupRandom(){
  mode="random";stampPath=todayStamp();ghostImg.src=stampPath;qrHist=[];visitN=0;
  hideSelect();clearStamps();uploaded=null;setCard(RAND_CARD);updateTop();
}

});

pt.addEventListener("contextmenu",e=>e.preventDefault());
pt.addEventListener("pointerdown",e=>{if(!activeWin||!cardPath)return;pDown=true;pId=e.pointerId;pt.setPointerCapture(e.pointerId);startPress(e.clientX,e.clientY);});
pt.addEventListener("pointermove",e=>{if(!pDown||e.pointerId!==pId)return;movePress(e.clientX,e.clientY);});
pt.addEventListener("pointerup",e=>{if(e.pointerId!==pId)return;cancelPress();});
pt.addEventListener("pointercancel",e=>{if(e.pointerId!==pId)return;cancelPress();});
pt.addEventListener("pointerleave",()=>{if(pDown)cancelPress();});
imgFrame.addEventListener("pointermove",e=>{if(pDown||!activeWin||!cardPath)return;if(!inCard(e.clientX,e.clientY)){hideGhost();return;}showGhost(e.clientX,e.clientY);});
imgFrame.addEventListener("pointerleave",()=>{if(!pDown)hideGhost();});

secZone.addEventListener("dblclick",e=>{e.preventDefault();pwPopup.style.display==="block"?hidePW():showPW();});
let lastT=0;secZone.addEventListener("touchend",e=>{const n=Date.now();if(n-lastT<350){e.preventDefault();pwPopup.style.display==="block"?hidePW():showPW();}lastT=n;},{passive:false});
pwInput.addEventListener("input",()=>{if(pwInput.value===OV_PW){ovOpen=true;localStorage.setItem(SK_OV,"true");hidePW();setupRandom();}});

document.addEventListener("pointerdown",e=>{
  if(!pwPopup.contains(e.target)&&!secZone.contains(e.target))hidePW();
  if(!calPop.contains(e.target)&&!todayCircle.contains(e.target)&&!todayLabel.contains(e.target))calPop.classList.remove("visible");
});
window.addEventListener("resize",()=>{renderStamps();updateGhostSize();});
setInterval(()=>{
  todayPrv.src=todayStamp();
  if(mode)updateTop();
  else{const st=jstStatus();if(timeGate.classList.contains("visible")){gateRemain.textContent=fmtRem(st.rem);progBar.style.width=`${clamp(st.prog,0,100)}%`;}}
},1000);

if(!POOL.length)throw new Error("STAMP_POOL empty");
updateCounts();showSelect();updateTop();
</script>
